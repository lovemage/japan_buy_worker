<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Japan Buy 商品列表</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <header class="page-header">
      <div class="container">
        <h1>🌸 Japan Buy 商品列表 🛍️</h1>
        <p id="last-updated-text">✨ 資料載入中... ✨</p>
        <div class="view-switch" aria-label="檢視切換">
          <button type="button" class="btn-pill secondary view-switch__btn" data-view-mode="list">list</button>
          <button type="button" class="btn-pill secondary view-switch__btn" data-view-mode="card">card</button>
          <button type="button" class="btn-pill secondary view-switch__btn" data-view-mode="2card">2card</button>
        </div>
        <div id="promo-switch" class="view-switch" aria-label="優惠篩選切換">
          <button type="button" class="btn-pill secondary view-switch__btn" data-promo-max="all">一般價格</button>
          <button type="button" class="btn-pill secondary view-switch__btn" data-promo-max="450">&lt;450</button>
          <button type="button" class="btn-pill secondary view-switch__btn" data-promo-max="550">&lt;550</button>
        </div>
        <section id="category-filters" class="category-filters"></section>
      </div>
    </header>

    <main class="container">
      <section id="list-error" class="notice hidden"></section>
      <section id="product-grid" class="product-grid card" aria-live="polite"></section>
      <section id="pagination" class="pagination hidden" aria-live="polite">
        <button id="page-prev" class="btn-pill secondary" type="button">👈 上一頁</button>
        <p id="page-indicator" class="meta"></p>
        <button id="page-next" class="btn-pill secondary" type="button">下一頁 👉</button>
      </section>
    </main>
    <section id="promo-modal" class="promo-modal hidden" aria-hidden="true">
      <div class="promo-modal__content">
        <img id="promo-image" src="/assets/images/popup.jpg" alt="活動彈窗" />
      </div>
    </section>
    <div class="floating-nav-buttons" aria-label="分頁快捷按鈕">
      <button id="float-page-prev" class="btn-pill secondary" type="button">👈 上一頁</button>
      <button id="float-page-next" class="btn-pill secondary" type="button">下一頁 👉</button>
    </div>
    <a class="floating-request-btn" href="/request.html">
      需求單（<span id="floating-draft-count">0</span>）
    </a>

    <script type="module" src="/assets/app-list.js"></script>
  </body>
</html>
