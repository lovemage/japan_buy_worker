<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vovosnap — 登入</title>
  <link rel="icon" type="image/png" href="/assets/images/logo-3.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #F9F7F1; color: #3D3A35; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
    .login-card { background: #fff; border-radius: 14px; border: 1px solid #E5E0D6; padding: 40px 32px; max-width: 380px; width: 100%; text-align: center; }
    .login-card img { height: 36px; margin-bottom: 20px; }
    .login-card h1 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    .login-card p { font-size: 13px; color: #7A756D; margin-bottom: 24px; line-height: 1.5; }
    .login-buttons { display: flex; flex-direction: column; gap: 10px; width: 100%; }
    .btn-google, .btn-line { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 28px; color: #fff; border-radius: 8px; text-decoration: none; font-size: 15px; font-weight: 600; transition: background 150ms ease; width: 100%; }
    .btn-google { background: #1a1a1a; }
    .btn-google:hover { background: #333; }
    .btn-google svg { width: 18px; height: 18px; }
    .btn-line { background: #06C755; }
    .btn-line:hover { background: #05b34c; }
    .btn-line svg { width: 20px; height: 20px; }
    .last-login-hint { font-size: 12px; color: #7A756D; margin-bottom: 14px; padding: 6px 12px; background: #f5f3ee; border-radius: 6px; display: none; }
    .last-login-hint strong { color: #3D3A35; }
    .login-footer { margin-top: 16px; font-size: 11px; color: #aaa; }
    .login-footer a { color: #7A756D; text-decoration: none; }
    .login-footer a:hover { text-decoration: underline; }
    /* In-app browser banner */
    .inapp-banner { display: none; background: #fffbeb; border: 1px solid #f59e0b; border-radius: 10px; padding: 14px 16px; margin-bottom: 20px; text-align: center; font-size: 13px; color: #92400e; max-width: 380px; width: 100%; }
    .inapp-banner p { color: #92400e; margin-bottom: 6px; }
    .inapp-banner .title { font-weight: 600; margin-bottom: 4px; font-size: 14px; }
    .inapp-banner .sub { font-size: 12px; color: #a16207; margin-bottom: 8px; }
    .inapp-copy { display: inline-flex; align-items: center; gap: 4px; padding: 6px 16px; border: 1px solid #f59e0b; border-radius: 6px; background: #fff; color: #92400e; font-size: 12px; font-weight: 600; cursor: pointer; }
  </style>
</head>
<body>
  <div class="inapp-banner" id="inapp-banner">
    <p class="title" id="inapp-title">如需使用 Google 登入，請用瀏覽器開啟</p>
    <p class="sub" id="inapp-sub">目前您在 <span id="inapp-name">應用程式</span> 內建瀏覽器中。您可以直接使用 LINE 登入，或複製網址到瀏覽器使用 Google 登入。</p>
    <button class="inapp-copy" id="inapp-copy-btn" type="button">複製網址到瀏覽器開啟</button>
  </div>

  <div class="login-card">
    <a href="/"><img src="/assets/images/logo-3.png" alt="VOVOSnap" /></a>
    <h1>登入 / 註冊</h1>
    <p>免費註冊，30 秒開店，不需要信用卡。</p>
    <div class="last-login-hint" id="last-login-hint"></div>
    <div class="login-buttons">
      <a href="/auth/google" class="btn-google" id="google-btn" onclick="localStorage.setItem('vovosnap_last_login','google')">
        <svg viewBox="0 0 24 24"><path fill="#fff" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#fff" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#fff" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#fff" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Google 登入
      </a>
      <a href="/auth/line" class="btn-line" id="line-btn" onclick="localStorage.setItem('vovosnap_last_login','line')">
        <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg"><path fill="#fff" d="M102.89 52.75C102.89 30.66 82.82 12.75 58.2 12.75c-24.62 0-44.69 17.91-44.69 40s20.07 40 44.69 40c2.2 0 4.36-.16 6.47-.46.54-.08 1.07.1 1.44.48l5.37 5.48c.89.91 2.42.49 2.72-.74l1.2-4.93c.13-.55.54-1 1.07-1.19 15.3-5.77 26.42-19.41 26.42-34.64zM39.06 62.42a1.5 1.5 0 0 1-1.5 1.5h-10.8a1.5 1.5 0 0 1-1.5-1.5V43.08a1.5 1.5 0 0 1 1.5-1.5h2.04a1.5 1.5 0 0 1 1.5 1.5v16.3h7.26a1.5 1.5 0 0 1 1.5 1.5v1.54zm7.84 0a1.5 1.5 0 0 1-1.5 1.5h-2.04a1.5 1.5 0 0 1-1.5-1.5V43.08a1.5 1.5 0 0 1 1.5-1.5h2.04a1.5 1.5 0 0 1 1.5 1.5v19.34zm27.04 0a1.5 1.5 0 0 1-1.5 1.5h-2.04a1.5 1.5 0 0 1-1.2-.6l-8.16-11.04v10.14a1.5 1.5 0 0 1-1.5 1.5h-2.04a1.5 1.5 0 0 1-1.5-1.5V43.08a1.5 1.5 0 0 1 1.5-1.5h2.04c.47 0 .92.22 1.2.6l8.16 11.04V43.08a1.5 1.5 0 0 1 1.5-1.5h2.04a1.5 1.5 0 0 1 1.5 1.5v19.34zm18.96-14.3a1.5 1.5 0 0 1-1.5 1.5h-7.26v3.78h7.26a1.5 1.5 0 0 1 1.5 1.5v1.54a1.5 1.5 0 0 1-1.5 1.5H78.34a1.5 1.5 0 0 1-1.5-1.5V43.08a1.5 1.5 0 0 1 1.5-1.5H92.9a1.5 1.5 0 0 1 1.5 1.5v1.54a1.5 1.5 0 0 1-1.5 1.5h-7.26v3.78h7.26a1.5 1.5 0 0 1 1.5 1.5v1.72z"/></svg>
        LINE 登入
      </a>
    </div>
  </div>

  <p class="login-footer"><a href="/privacy.html">隱私權政策</a> ・ <a href="/terms.html">服務條款</a></p>

  <script>
  (function(){
    // Show last login method hint
    var lastLogin = localStorage.getItem("vovosnap_last_login");
    if (lastLogin) {
      var hintEl = document.getElementById("last-login-hint");
      if (hintEl) {
        var label = lastLogin === "line" ? "LINE" : "Google";
        hintEl.innerHTML = "上次使用 <strong>" + label + "</strong> 登入";
        hintEl.style.display = "block";
      }
    }

    var ua = navigator.userAgent || "";
    var isLine = /\bLine\b/i.test(ua);
    var isFB = /\bFBAV\b/i.test(ua) || /\bFB_IAB\b/i.test(ua);
    var isIG = /\bInstagram\b/i.test(ua);
    var appName = isLine ? "LINE" : isFB ? "Facebook" : isIG ? "Instagram" : "";
    if (!appName) return;

    document.getElementById("inapp-banner").style.display = "block";
    document.getElementById("inapp-name").textContent = appName;

    // Disable Google login in in-app browser
    var googleBtn = document.getElementById("google-btn");
    if (googleBtn) {
      googleBtn.style.opacity = "0.4";
      googleBtn.style.pointerEvents = "none";
    }
    // LINE login works in all in-app browsers — keep it enabled

    var btn = document.getElementById("inapp-copy-btn");
    if (btn) btn.addEventListener("click", function() {
      var url = location.href;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url).then(function() { btn.textContent = "已複製！"; setTimeout(function() { btn.textContent = "複製網址到瀏覽器開啟"; }, 2000); });
      } else {
        var ta = document.createElement("textarea"); ta.value = url; ta.style.position = "fixed"; ta.style.opacity = "0";
        document.body.appendChild(ta); ta.select(); try { document.execCommand("copy"); btn.textContent = "已複製！"; setTimeout(function() { btn.textContent = "複製網址到瀏覽器開啟"; }, 2000); } catch(e) {} document.body.removeChild(ta);
      }
    });
  })();
  </script>
</body>
</html>
