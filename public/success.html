<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>訂單確認</title>
    <link rel="stylesheet" href="/assets/styles.css" />
    <link rel="stylesheet" href="/assets/templates.css" />
    <script>if (!window.apiFetch) window.apiFetch = function(p, o) { return fetch((window.__API_BASE || '') + p, o); };</script>
  </head>
  <body>
    <div class="success-wrap">
      <div class="success-header">
        <div class="success-icon">
          <svg class="checkmark-anim" viewBox="0 0 52 52" width="56" height="56" aria-hidden="true">
            <circle class="checkmark-circle" cx="26" cy="26" r="24" fill="none" stroke="var(--primary-color)" stroke-width="2.5"/>
            <path class="checkmark-check" fill="none" stroke="var(--primary-color)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" d="M15 27l7 7 15-15"/>
          </svg>
        </div>
        <h1>感謝您的訂購！</h1>
        <p class="order-code" id="success-id">單號載入中...</p>
      </div>

      <div class="success-msg" id="checkout-message">
        <strong>感謝您支持本商店服務</strong>
        請將本頁面截圖傳至群組或 Line，我們將人工與您核對訂單內容。
      </div>

      <div class="success-cta-line">
        <button id="screenshot-hint-btn" class="btn-pill" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px;margin-right:4px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          截圖本頁傳至 Line 完成訂購
        </button>
        <p class="meta" style="text-align:center;margin-top:6px;">截圖後傳給賣家，我們會人工核對訂單</p>
      </div>

      <div class="order-summary">
        <div class="order-summary-title">訂單明細</div>
        <div id="order-items"></div>
        <div class="order-totals" id="order-totals"></div>
      </div>

      <section id="success-error" class="notice hidden"></section>

      <div class="success-actions">
        <button id="copy-order-text" class="btn-pill" type="button">📋 複製訂單資訊</button>
        <a class="btn-pill secondary" id="back-to-store" href="/store.html">← 返回商店</a>
      </div>
    </div>

    <script type="module">
    import { applyProductImageFallback } from "./assets/image-fallback.js";

    const _cc = window.__COUNTRY_CONFIG || {};
    const srcSym = _cc.currencySymbol || "¥";

    // Fix back-to-store link
    const base = window.__API_BASE || "";
    const backLink = document.getElementById("back-to-store");
    if (backLink && base) backLink.href = base + "/";

    async function loadOrder() {
      const params = new URLSearchParams(location.search);
      const id = params.get("id");
      if (!id) { document.getElementById("success-id").textContent = "缺少訂單 ID"; return; }

      const res = await apiFetch("/api/requirement?id=" + encodeURIComponent(id));
      if (!res.ok) { document.getElementById("success-error").textContent = "載入失敗"; document.getElementById("success-error").classList.remove("hidden"); return; }
      const data = await res.json();
      if (!data.ok || !data.requirement) { document.getElementById("success-error").textContent = "找不到訂單"; document.getElementById("success-error").classList.remove("hidden"); return; }

      const order = data.requirement;
      document.getElementById("success-id").textContent = "訂單編號：" + (order.orderCode || order.id);

      // Render items
      const itemsEl = document.getElementById("order-items");
      const items = order.items || [];
      itemsEl.innerHTML = items.map(function(item) {
        const spec = [item.desiredSize, item.desiredColor].filter(Boolean).join(" / ");
        return '<div class="order-item">' +
          '<div class="name">' + (item.productNameSnapshot || "商品") +
            (spec ? '<div class="spec">' + spec + ' × ' + item.quantity + '</div>' : '<div class="spec">× ' + item.quantity + '</div>') +
          '</div>' +
          '<div class="price">NT$' + Number(item.subtotalTwd || 0).toLocaleString() + '</div>' +
        '</div>';
      }).join("");

      // Render totals
      const totalsEl = document.getElementById("order-totals");
      const itemTotal = items.reduce(function(sum, i) { return sum + (Number(i.subtotalTwd) || 0); }, 0);
      const shipping = Number(order.shippingTotalTwd) || 0;
      totalsEl.innerHTML =
        '<div class="row"><span>商品小計</span><span>NT$' + itemTotal.toLocaleString() + '</span></div>' +
        (shipping > 0 ? '<div class="row"><span>運費</span><span>NT$' + shipping.toLocaleString() + '</span></div>' : '') +
        '<div class="row total"><span>合計</span><span>NT$' + (itemTotal + shipping).toLocaleString() + '</span></div>';

      // Copy button
      document.getElementById("copy-order-text").addEventListener("click", function() {
        var text = "【訂單確認】\n訂單編號：" + (order.orderCode || order.id) + "\n";
        text += "姓名：" + (order.customerName || "") + "\n";
        text += "電話：" + (order.memberPhone || "") + "\n";
        text += "Line：" + (order.lineId || "") + "\n\n";
        items.forEach(function(item) {
          text += "• " + (item.productNameSnapshot || "") + " × " + item.quantity + " = NT$" + Number(item.subtotalTwd || 0).toLocaleString() + "\n";
        });
        text += "\n商品小計：NT$" + itemTotal.toLocaleString();
        if (shipping > 0) text += "\n運費：NT$" + shipping.toLocaleString();
        text += "\n合計：NT$" + (itemTotal + shipping).toLocaleString();
        navigator.clipboard.writeText(text).then(function() {
          var btn = document.getElementById("copy-order-text");
          btn.textContent = "✓ 已複製";
          setTimeout(function() { btn.textContent = "📋 複製訂單資訊"; }, 2000);
        });
      });

      // Load custom checkout message from store settings
      try {
        const msgRes = await apiFetch("/api/admin/display-settings");
        const msgData = await msgRes.json();
        if (msgData.ok && msgData.checkoutMessage) {
          document.getElementById("checkout-message").innerHTML =
            '<strong>感謝您支持本商店服務</strong>' + msgData.checkoutMessage.replace(/\n/g, '<br>');
        }
      } catch(e) {}
    }

    loadOrder();
    </script>
  </body>
</html>
