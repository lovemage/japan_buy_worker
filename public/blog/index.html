.tag-btn { display: inline-block; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; border: 1.5px solid var(--border); background: var(--bg-card); color: var(--text-secondary); cursor: pointer; transition: all 0.15s; }
.tag-btn:hover { border-color: var(--brand); color: var(--brand); }
.tag-btn.active { background: var(--brand); color: #fff; border-color: var(--brand); }

/* ── Post cards with thumbnails ── */
.post-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 16px; text-decoration: none; display: block; transition: all 0.2s; overflow: hidden; }
.post-card:hover { border-color: var(--brand); box-shadow: 0 4px 16px rgba(138,154,91,0.12); transform: translateY(-2px); }
.post-card--with-thumb { display: flex; align-items: stretch; }
.post-card__thumb { flex-shrink: 0; width: 120px; min-height: 120px; overflow: hidden; }
.post-card__thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.post-card__body { padding: 16px; flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
.post-card .post-tag { display: inline-block; font-size: 11px; font-weight: 700; color: var(--brand); background: var(--brand-light); padding: 3px 10px; border-radius: 6px; margin-bottom: 8px; letter-spacing: 0.5px; align-self: flex-start; }

.post-card .post-meta { font-size: 11px; color: var(--text-muted); }

@media (max-width: 480px) {

  .post-card h2 { font-size: 15px; }
