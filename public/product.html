<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>商品詳情</title>
    <link rel="stylesheet" href="/assets/styles.css" />
    <link rel="stylesheet" href="/assets/templates.css" />
  <script>
  // Detect store base path from returnTo param or current URL
  if (!window.__API_BASE) {
    var params = new URLSearchParams(location.search);
    var ret = params.get("returnTo") || "";
    var m = ret.match(/^(\/s\/[a-z0-9][a-z0-9-]*[a-z0-9]|\/s\/[a-z0-9]{1,2})/);
    if (m) window.__API_BASE = m[1];
    else {
      var pm = location.pathname.match(/^(\/s\/[a-z0-9][a-z0-9-]*)/);
      if (pm) window.__API_BASE = pm[1];
    }
  }
  if (!window.apiFetch) window.apiFetch = function(p, o) { return fetch((window.__API_BASE || '') + p, o); };
  // Fetch store info if not injected by serveTenantHtml
  if (!window.__COUNTRY_CONFIG && window.__API_BASE) {
    fetch(window.__API_BASE + "/api/admin/store-info").then(function(r){return r.json()}).then(function(d) {
      if (d.ok && d.store) {
        if (d.store.countryConfig) window.__COUNTRY_CONFIG = d.store.countryConfig;
        if (d.store.name) window.__STORE_NAME = d.store.name;
      }
    }).catch(function(){});
  }
  // Fetch display settings if not injected
  if (!window.__DISPLAY_SETTINGS && window.__API_BASE) {
    fetch(window.__API_BASE + "/api/admin/display-settings").then(function(r){return r.json()}).then(function(d) {
      if (d.ok) { window.__DISPLAY_SETTINGS = d; document.dispatchEvent(new Event("ds-ready")); }
    }).catch(function(){});
  }
  </script>
  </head>
  <body>
    <header class="page-header">
      <div class="container">
        <div class="header-top">
          <div class="header-left">
            <a href="/" id="store-logo-link"><img id="store-logo" class="store-logo-header" src="/assets/images/logo2.png" alt="商店 Logo" /></a>
            <div>
              <h1 id="store-header-name">商品詳情</h1>
            </div>
          </div>
        </div>
      </div>
      <div id="deadline-countdown" class="deadline-countdown" style="display:none;"></div>
    </header>
    <script>
    (function(){
      var ds = window.__DISPLAY_SETTINGS || {};
      var base = window.__API_BASE || "";
      // Store logo
      var logoLink = document.getElementById("store-logo-link");
      if (logoLink && base) logoLink.href = base + "/";
      if (ds.storeLogo) {
        var logoSrc = base + "/api/images/" + ds.storeLogo;
        var el = document.getElementById("store-logo");
        if (el) el.src = logoSrc;
      }
      // Store name
      var h = document.getElementById("store-header-name");
      if (h && window.__STORE_NAME) h.textContent = window.__STORE_NAME;
      // Store rules
      if (ds.storeRules) {
        document.addEventListener("DOMContentLoaded", function() {
          var box = document.getElementById("store-rules-box");
          var content = document.getElementById("store-rules-content");
          if (box && content) { content.textContent = ds.storeRules; box.style.display = ""; }
        });
      }
      // Fix floating button hrefs
      var reqBtn = document.querySelector(".floating-request-btn");
      if (reqBtn) reqBtn.href = base + "/request.html";
      var backBtn = document.getElementById("floating-back-btn");
      if (backBtn) {
        var returnTo = new URLSearchParams(location.search).get("returnTo") || "";
        backBtn.href = returnTo && returnTo.startsWith("/") ? returnTo : (base + "/store.html");
      }
      // Deadline countdown
      function initDeadline(settings) {
        if (!settings || !settings.deadlineEnabled || !settings.deadlineTime) return;
        var cdEl = document.getElementById("deadline-countdown");
        if (!cdEl) return;
        var deadline = new Date(settings.deadlineTime).getTime();
        function tickProduct() {
          var now = Date.now();
          var diff = deadline - now;
          if (diff <= 0) { cdEl.textContent = "代購已截止"; return; }
          var d = Math.floor(diff / 86400000);
          var hr = Math.floor((diff % 86400000) / 3600000);
          var min = Math.floor((diff % 3600000) / 60000);
          var sec = Math.floor((diff % 60000) / 1000);
          var parts = [];
          if (d > 0) parts.push(d + " 天");
          parts.push(String(hr).padStart(2, "0") + ":" + String(min).padStart(2, "0") + ":" + String(sec).padStart(2, "0"));
          cdEl.textContent = "代購截止倒數 " + parts.join(" ");
          requestAnimationFrame(function() { setTimeout(tickProduct, 1000); });
        }
        cdEl.style.display = "";
        tickProduct();
      }
      initDeadline(ds);
      // Also listen for async display settings load
      document.addEventListener("ds-ready", function() { initDeadline(window.__DISPLAY_SETTINGS); });
    })();
    </script>

    <main class="container">
      <section id="detail-error" class="notice hidden"></section>
      <article class="product-detail" id="product-detail">
        <div class="detail-image-col">
          <div class="detail-main-wrap" id="detail-main-wrap">
            <div class="loading-bar-wrap"><div class="loading-bar"></div></div>
            <img id="detail-main-image" class="detail-main-image" src="" alt="" />
          </div>
          <div id="detail-gallery" class="detail-gallery"></div>
        </div>
        <div class="detail-meta">
          <div class="detail-title-row">
            <h2 id="detail-title" class="detail-title"></h2>
            <button type="button" class="detail-share-btn" id="detail-share-btn" aria-label="分享商品">
              <svg class="detail-share-btn__icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="18" cy="5" r="3"></circle>
                <circle cx="6" cy="12" r="3"></circle>
                <circle cx="18" cy="19" r="3"></circle>
                <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
                <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
              </svg>
              <svg class="detail-share-btn__check" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="4 12 10 18 20 6"></polyline>
              </svg>
            </button>
          </div>
          <p id="detail-brand" class="detail-brand"></p>
          <div id="detail-price" class="detail-price-block"></div>
          <div class="detail-attributes">
            <p class="meta" id="detail-category"></p>
            <p class="meta" id="detail-color-count"></p>
          </div>
          <div id="detail-variant-box" class="detail-variant-box hidden">
            <label for="detail-variant-select" class="detail-variant-label">規格</label>
            <select id="detail-variant-select" class="detail-variant-select"></select>
            <p id="detail-variant-stock" class="meta"></p>
          </div>
          <p class="meta" id="detail-description"></p>
          <div class="detail-spec-box">
            <h3>商品規格</h3>
            <ul id="detail-spec-list"></ul>
          </div>
          <div id="store-rules-box" class="detail-spec-box" style="display:none;">
            <h3>賣場規則</h3>
            <div id="store-rules-content" style="font-size:13px;color:#666;white-space:pre-line;line-height:1.6;"></div>
          </div>
        </div>
      </article>
      <section class="recommendations" id="recommendations-section" hidden>
        <h3 class="recommendations__title">您可能也喜歡</h3>
        <div class="recommendations__scroll" id="recommendations-list" role="list"></div>
      </section>
    </main>
    <div class="detail-actions" id="detail-actions">
      <div class="qty-stepper">
        <button type="button" class="qty-stepper__btn" id="qty-minus" aria-label="減少數量">-</button>
        <input id="detail-quantity" class="qty-stepper__input" type="number" min="1" value="1" aria-label="數量" />
        <button type="button" class="qty-stepper__btn" id="qty-plus" aria-label="增加數量">+</button>
      </div>
      <button id="detail-add" class="button detail-add-btn" type="button" aria-label="加入訂單">
        <svg class="detail-add-btn__icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="9" cy="20" r="1"></circle>
          <circle cx="18" cy="20" r="1"></circle>
          <path d="M2 4h3l2.2 10.2a2 2 0 0 0 2 1.6h7.9a2 2 0 0 0 2-1.5L21 7H6.2"></path>
        </svg>
        <svg class="detail-add-btn__check" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="4 12 10 18 20 6" />
        </svg>
      </button>
    </div>
    <a class="floating-back-btn" id="floating-back-btn" href="#" aria-label="上一頁" onclick="event.preventDefault(); history.back();">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <a class="floating-request-btn" href="/request.html" aria-label="購物車">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      <span class="floating-cart-badge" id="floating-draft-count" style="display:none;">0</span>
    </a>

    <script type="module" src="/assets/app-product.js"></script>
  </body>
</html>
