<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>商品詳情</title>
    <link rel="stylesheet" href="/assets/styles.css" />
    <link rel="stylesheet" href="/assets/templates.css" />
  <script>
  // Detect store base path from returnTo param or current URL
  if (!window.__API_BASE) {
    var params = new URLSearchParams(location.search);
    var ret = params.get("returnTo") || "";
    var m = ret.match(/^(\/s\/[a-z0-9][a-z0-9-]*[a-z0-9]|\/s\/[a-z0-9]{1,2})/);
    if (m) window.__API_BASE = m[1];
    else {
      var pm = location.pathname.match(/^(\/s\/[a-z0-9][a-z0-9-]*)/);
      if (pm) window.__API_BASE = pm[1];
    }
  }
  if (!window.apiFetch) window.apiFetch = function(p, o) { return fetch((window.__API_BASE || '') + p, o); };
  // Fetch country config if not injected by serveTenantHtml
  if (!window.__COUNTRY_CONFIG && window.__API_BASE) {
    fetch(window.__API_BASE + "/api/admin/store-info").then(function(r){return r.json()}).then(function(d) {
      if (d.ok && d.store && d.store.countryConfig) {
        window.__COUNTRY_CONFIG = d.store.countryConfig;
      }
    }).catch(function(){});
  }
  </script>
  </head>
  <body>
    <!-- In-app browser detection banner -->
    <div id="inapp-banner" style="display:none;position:fixed;top:0;left:0;right:0;z-index:9999;background:#fffbeb;border-bottom:1px solid #f59e0b;padding:12px 16px;text-align:center;font-size:13px;color:#92400e;">
      <p style="margin:0 0 6px;font-weight:600;">請使用瀏覽器 (Chrome, Safari) 才能使用本網站完整功能</p>
      <p style="margin:0 0 8px;font-size:12px;color:#a16207;">目前您正在使用 <span id="inapp-name">應用程式</span> 內建瀏覽器，部分功能可能受限</p>
      <button id="inapp-copy-btn" style="display:inline-flex;align-items:center;gap:4px;padding:6px 16px;border:1px solid #f59e0b;border-radius:6px;background:#fff;color:#92400e;font-size:12px;font-weight:600;cursor:pointer;" type="button">複製網址到瀏覽器開啟</button>
    </div>
    <script>
    (function(){
      var ua = navigator.userAgent || "";
      var isLine = /\bLine\b/i.test(ua);
      var isFB = /\bFBAV\b/i.test(ua) || /\bFB_IAB\b/i.test(ua);
      var isIG = /\bInstagram\b/i.test(ua);
      var appName = isLine ? "LINE" : isFB ? "Facebook" : isIG ? "Instagram" : "";
      if (!appName) return;
      var banner = document.getElementById("inapp-banner");
      if (banner) { banner.style.display = "block"; document.getElementById("inapp-name").textContent = appName; document.body.style.paddingTop = banner.offsetHeight + "px"; }
      var btn = document.getElementById("inapp-copy-btn");
      if (btn) btn.addEventListener("click", function() {
        var url = location.href;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(url).then(function() { btn.textContent = "已複製！"; setTimeout(function() { btn.textContent = "複製網址到瀏覽器開啟"; }, 2000); });
        } else {
          var ta = document.createElement("textarea"); ta.value = url; ta.style.position = "fixed"; ta.style.opacity = "0";
          document.body.appendChild(ta); ta.select(); try { document.execCommand("copy"); btn.textContent = "已複製！"; setTimeout(function() { btn.textContent = "複製網址到瀏覽器開啟"; }, 2000); } catch(e) {} document.body.removeChild(ta);
        }
      });
    })();
    </script>
    <header class="page-header">
      <div class="container">
        <img id="store-logo" class="store-logo" style="display:none;" alt="商店 Logo" />
        <a id="detail-back-link" class="button secondary" href="/store.html">← 返回商店</a>
      </div>
    </header>
    <script>
    (function(){
      var ds = window.__DISPLAY_SETTINGS || {};
      if (ds.storeLogo) { var el = document.getElementById("store-logo"); if (el) { el.src = (window.__API_BASE || "") + "/api/images/" + ds.storeLogo; el.style.display = "block"; } }
      if (ds.storeRules) {
        document.addEventListener("DOMContentLoaded", function() {
          var box = document.getElementById("store-rules-box");
          var content = document.getElementById("store-rules-content");
          if (box && content) { content.textContent = ds.storeRules; box.style.display = ""; }
        });
      }
    })();
    </script>

    <main class="container">
      <section id="detail-error" class="notice hidden"></section>
      <article class="product-detail" id="product-detail">
        <div class="detail-image-col">
          <div class="detail-main-wrap">
            <img id="detail-main-image" class="detail-main-image" src="" alt="" />
          </div>
          <div id="detail-gallery" class="detail-gallery"></div>
        </div>
        <div class="detail-meta">
          <h2 id="detail-title" class="detail-title"></h2>
          <p id="detail-brand" class="detail-brand"></p>
          <div id="detail-price" class="detail-price-block"></div>
          <div class="detail-attributes">
            <p class="meta" id="detail-category"></p>
            <p class="meta" id="detail-color-count"></p>
            <p class="meta" id="detail-size-options"></p>
            <p class="meta" id="detail-color-options"></p>
          </div>
          <p class="meta" id="detail-description"></p>
          <div class="detail-spec-box">
            <h3>商品規格</h3>
            <ul id="detail-spec-list"></ul>
          </div>
          <div id="store-rules-box" class="detail-spec-box" style="display:none;">
            <h3>賣場規則</h3>
            <div id="store-rules-content" style="font-size:13px;color:#666;white-space:pre-line;line-height:1.6;"></div>
          </div>
        </div>
      </article>
    </main>
    <div class="detail-actions" id="detail-actions">
      <div class="qty-stepper">
        <button type="button" class="qty-stepper__btn" id="qty-minus" aria-label="減少數量">-</button>
        <input id="detail-quantity" class="qty-stepper__input" type="number" min="1" value="1" aria-label="數量" />
        <button type="button" class="qty-stepper__btn" id="qty-plus" aria-label="增加數量">+</button>
      </div>
      <button id="detail-add" class="button detail-add-btn" type="button">
        <span class="detail-add-btn__text">加入需求單</span>
        <svg class="detail-add-btn__check" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="4 12 10 18 20 6" />
        </svg>
      </button>
    </div>
    <a class="floating-request-btn" href="/request.html" aria-label="購物車">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      <span class="floating-cart-badge" id="floating-draft-count" style="display:none;">0</span>
    </a>

    <script type="module" src="/assets/app-product.js"></script>
  </body>
</html>
