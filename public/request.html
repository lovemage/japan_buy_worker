<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Japan Buy 🌸 需求單</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <header class="page-header">
      <div class="container">
        <h1>需求單 📝</h1>
        <a class="btn-pill secondary" href="/index.html">返回商品列表 🛍️</a>
      </div>
    </header>

    <main class="container">
      <section id="request-error" class="notice hidden"></section>
      <section id="request-items" class="request-items"></section>

      <form id="request-form" class="request-form card">
        <label>
          會員姓名 👤
          <input id="memberName" name="memberName" type="text" class="input-cute" required />
        </label>
        <label>
          會員電話 📱
          <input id="memberPhone" name="memberPhone" type="tel" class="input-cute" required />
        </label>
        <label>
          收件縣市 🏙️
          <select id="recipientCity" name="recipientCity" class="input-cute" required></select>
        </label>
        <label>
          收件地址 🏠
          <input id="recipientAddress" name="recipientAddress" type="text" class="input-cute" required />
        </label>
        <label>
          Line ID 💬
          <input id="lineId" name="lineId" type="text" class="input-cute" required />
        </label>
        <fieldset id="shipping-options-box" class="detail-spec-box">
          <legend>配送方式 🚚</legend>
          <label>
            <input type="radio" name="shippingMethod" value="consolidated_tw" checked />
            集運回台灣（國際運費 + 國內 7-11 店到店） 🇹🇼
          </label>
          <label>
            <input type="radio" name="shippingMethod" value="jp_direct" />
            日本直送（僅國際運費，需完成 EZWAY 驗證） 🇯🇵
          </label>
          <label>
            <input type="radio" name="shippingMethod" value="limited_proxy" />
            限時連線代購（固定運費） ⚡
          </label>
          <p id="shipping-note" class="meta"></p>
        </fieldset>
        <label>
          整單備註 ✏️
          <textarea id="notes" name="notes" rows="3" class="input-cute"></textarea>
        </label>
        <div class="captcha-box">
          <p class="meta">圖形驗證：請輸入圖中英數字 🖼️</p>
          <svg id="captcha-svg" class="captcha-svg" viewBox="0 0 160 50" aria-label="captcha"></svg>
          <input id="captchaInput" name="captchaInput" type="text" class="input-cute" placeholder="輸入驗證碼" required />
          <button id="captcha-refresh" class="btn-pill secondary" type="button">重新產生 🔄</button>
        </div>
        <section class="request-total-box">
          <p class="meta" id="shipping-twd">運費 TWD：0</p>
          <p class="meta" id="total-jpy">合計 JPY：0</p>
          <p class="meta" id="total-twd">合計 TWD：0</p>
        </section>
        <button class="btn-pill" type="submit">送出需求單 ✨</button>
      </form>
    </main>

    <script type="module" src="/assets/app-request.js"></script>
  </body>
</html>
