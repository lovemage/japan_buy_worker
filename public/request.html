<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>需求單</title>
    <link rel="stylesheet" href="/assets/styles.css" />
    <script>if (!window.apiFetch) window.apiFetch = function(p, o) { return fetch((window.__API_BASE || '') + p, o); };</script>
  </head>
  <body>
    <header class="page-header">
      <div class="container">
        <h1>需求單</h1>
        <a class="btn-pill secondary" href="/store.html">← 返回商店</a>
      </div>
    </header>

    <main class="container">
      <section id="request-error" class="notice hidden"></section>
      <section id="request-items" class="request-items"></section>

      <form id="request-form" class="request-form">
        <label>
          會員姓名
          <input id="memberName" name="memberName" type="text" class="input-cute" required />
        </label>
        <label>
          會員電話
          <input id="memberPhone" name="memberPhone" type="tel" class="input-cute" required />
        </label>
        <label>
          收件縣市
          <select id="recipientCity" name="recipientCity" class="input-cute" required></select>
        </label>
        <label>
          收件地址
          <input id="recipientAddress" name="recipientAddress" type="text" class="input-cute" required />
        </label>
        <label>
          Line ID
          <input id="lineId" name="lineId" type="text" class="input-cute" required />
        </label>
        <fieldset id="shipping-options-box" class="shipping-options">
          <legend>配送方式</legend>
          <label class="shipping-option">
            <input type="radio" name="shippingMethod" value="consolidated_tw" checked />
            <span>
              <strong>集運回台灣</strong>
              <span class="meta">國際運費 + 國內 7-11 店到店</span>
            </span>
          </label>
          <label class="shipping-option">
            <input type="radio" name="shippingMethod" value="jp_direct" />
            <span>
              <strong>日本直送</strong>
              <span class="meta">僅國際運費，需完成 EZWAY 驗證</span>
            </span>
          </label>
          <label class="shipping-option">
            <input type="radio" name="shippingMethod" value="limited_proxy" />
            <span>
              <strong>限時連線代購</strong>
              <span class="meta">固定運費</span>
            </span>
          </label>
          <p id="shipping-note" class="meta"></p>
        </fieldset>
        <label>
          整單備註
          <textarea id="notes" name="notes" rows="3" class="input-cute"></textarea>
        </label>
        <div class="captcha-box">
          <p class="meta">請輸入圖中英數字</p>
          <svg id="captcha-svg" class="captcha-svg" viewBox="0 0 160 50" aria-label="圖形驗證碼"></svg>
          <input id="captchaInput" name="captchaInput" type="text" class="input-cute" placeholder="輸入驗證碼" required autocomplete="off" />
          <button id="captcha-refresh" class="btn-pill secondary" type="button">重新產生</button>
        </div>
        <section class="request-total-box">
          <p class="meta" id="shipping-twd">運費：NT$0</p>
          <p class="meta" id="total-jpy">商品合計：&yen;0</p>
          <p id="total-twd" class="request-total-highlight">合計：NT$0</p>
        </section>
        <button id="submit-btn" class="btn-pill" type="submit">送出需求單</button>
      </form>
    </main>

    <script type="module" src="/assets/app-request.js"></script>
  </body>
</html>
