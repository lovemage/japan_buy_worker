<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>訂單</title>
    <link rel="stylesheet" href="/assets/styles.css" />
    <link rel="stylesheet" href="/assets/templates.css" />
    <script>
    if (!window.__API_BASE) {
      var pm = location.pathname.match(/^(\/s\/[a-z0-9][a-z0-9-]*)/);
      if (pm) window.__API_BASE = pm[1];
    }
    if (!window.apiFetch) window.apiFetch = function(p, o) { return fetch((window.__API_BASE || '') + p, o); };
    document.addEventListener("DOMContentLoaded", function() {
      var base = window.__API_BASE || "";
      var back = document.getElementById("back-to-store");
      if (back) back.href = base + "/";
    });
    </script>
  </head>
  <body>
    <!-- In-app browser detection banner -->
    <div id="inapp-banner" style="display:none;position:fixed;top:0;left:0;right:0;z-index:9999;background:#fffbeb;border-bottom:1px solid #f59e0b;padding:12px 16px;text-align:center;font-size:13px;color:#92400e;">
      <p style="margin:0 0 6px;font-weight:600;">請使用瀏覽器 (Chrome, Safari) 才能使用本網站完整功能</p>
      <p style="margin:0 0 8px;font-size:12px;color:#a16207;">目前您正在使用 <span id="inapp-name">應用程式</span> 內建瀏覽器，部分功能可能受限</p>
      <button id="inapp-copy-btn" style="display:inline-flex;align-items:center;gap:4px;padding:6px 16px;border:1px solid #f59e0b;border-radius:6px;background:#fff;color:#92400e;font-size:12px;font-weight:600;cursor:pointer;" type="button">複製網址到瀏覽器開啟</button>
    </div>
    <script>
    (function(){
      var ua = navigator.userAgent || "";
      var isLine = /\bLine\b/i.test(ua);
      var isFB = /\bFBAV\b/i.test(ua) || /\bFB_IAB\b/i.test(ua);
      var isIG = /\bInstagram\b/i.test(ua);
      var appName = isLine ? "LINE" : isFB ? "Facebook" : isIG ? "Instagram" : "";
      if (!appName) return;
      var banner = document.getElementById("inapp-banner");
      if (banner) { banner.style.display = "block"; document.getElementById("inapp-name").textContent = appName; document.body.style.paddingTop = banner.offsetHeight + "px"; }
      var btn = document.getElementById("inapp-copy-btn");
      if (btn) btn.addEventListener("click", function() {
        var url = location.href;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(url).then(function() { btn.textContent = "已複製！"; setTimeout(function() { btn.textContent = "複製網址到瀏覽器開啟"; }, 2000); });
        } else {
          var ta = document.createElement("textarea"); ta.value = url; ta.style.position = "fixed"; ta.style.opacity = "0";
          document.body.appendChild(ta); ta.select(); try { document.execCommand("copy"); btn.textContent = "已複製！"; setTimeout(function() { btn.textContent = "複製網址到瀏覽器開啟"; }, 2000); } catch(e) {} document.body.removeChild(ta);
        }
      });
    })();
    </script>
    <header class="page-header">
      <div class="container sub-header">
        <a class="sub-header__back" id="back-to-store" href="/store.html">← 返回商店</a>
        <img id="store-logo" class="sub-header__logo" style="display:none;" alt="商店 Logo" />
      </div>
    </header>
    <script>
    (function(){ var ds = window.__DISPLAY_SETTINGS || {}; if (ds.storeLogo) { var el = document.getElementById("store-logo"); if (el) { el.src = (window.__API_BASE || "") + "/api/images/" + ds.storeLogo; el.style.display = ""; } } })();
    </script>

    <main class="container">
      <section id="request-error" class="notice hidden" role="alert" aria-live="assertive"></section>
      <section id="request-items" class="request-items" role="list" aria-label="訂單商品列表"></section>

      <form id="request-form" class="request-form">
        <p class="trust-signal" aria-label="隱私保護說明">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px;"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>您的資料僅用於本次代購配送，不會用於其他用途
        </p>
        <label for="memberName">
          會員姓名
          <input id="memberName" name="memberName" type="text" class="input-cute" required aria-required="true" placeholder="收件人真實姓名" />
        </label>
        <div class="form-row-half">
          <label for="memberPhone">
            會員電話
            <input id="memberPhone" name="memberPhone" type="tel" class="input-cute" required aria-required="true" placeholder="09xx-xxx-xxx" />
          </label>
          <label for="lineId">
            Line ID
            <span class="field-hint">用於配送進度通知與對帳確認</span>
            <input id="lineId" name="lineId" type="text" class="input-cute" required aria-required="true" />
          </label>
        </div>
        <label for="recipientCity">
          收件縣市
          <select id="recipientCity" name="recipientCity" class="input-cute" required aria-required="true"></select>
        </label>
        <label for="recipientAddress">
          收件地址
          <input id="recipientAddress" name="recipientAddress" type="text" class="input-cute" required aria-required="true" placeholder="街道路名、門牌號碼、樓層" />
        </label>
        <fieldset id="shipping-options-box" class="shipping-options">
          <legend>配送方式</legend>
          <label class="shipping-option">
            <input type="radio" name="shippingMethod" value="consolidated_tw" checked />
            <span>
              <strong>集運回台灣</strong>
              <span class="meta">國際運費 + 國內 7-11 店到店｜預估 NT$150–350 依重量</span>
            </span>
          </label>
          <label class="shipping-option">
            <input type="radio" name="shippingMethod" value="jp_direct" />
            <span>
              <strong>日本直送</strong>
              <span class="meta">僅國際運費｜預估 NT$300–800 依重量｜需完成 EZWAY 驗證</span>
            </span>
          </label>
          <label class="shipping-option">
            <input type="radio" name="shippingMethod" value="limited_proxy" />
            <span>
              <strong>限時連線代購</strong>
              <span class="meta">固定運費 NT$200</span>
            </span>
          </label>
          <p id="shipping-note" class="meta"></p>
        </fieldset>
        <label>
          整單備註
          <textarea id="notes" name="notes" rows="3" class="input-cute"></textarea>
        </label>
        <div class="captcha-box">
          <p class="meta">請輸入圖中英數字</p>
          <svg id="captcha-svg" class="captcha-svg" viewBox="0 0 160 50" role="img" aria-label="圖形驗證碼，請看圖片輸入英數字"></svg>
          <label for="captchaInput" class="sr-only">驗證碼</label>
          <input id="captchaInput" name="captchaInput" type="text" class="input-cute" placeholder="輸入驗證碼" required autocomplete="off" aria-required="true" />
          <button id="captcha-refresh" class="btn-pill secondary" type="button" aria-label="重新產生驗證碼">重新產生</button>
        </div>
        <section class="request-total-box">
          <p class="meta" id="shipping-twd">運費：NT$0</p>
          <p class="meta" id="total-jpy">商品合計：&yen;0</p>
          <p id="total-twd" class="request-total-highlight">合計：NT$0</p>
        </section>
        <button id="submit-btn" class="btn-pill" type="submit">送出訂單</button>
      </form>
    </main>

    <script type="module" src="/assets/app-request.js"></script>
  </body>
</html>
