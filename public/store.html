<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vovosnap 商品列表</title>
    <link rel="stylesheet" href="/assets/styles.css" />
    <link rel="stylesheet" href="/assets/templates.css" />
    <script>if (!window.apiFetch) window.apiFetch = function(p, o) { return fetch((window.__API_BASE || '') + p, o); };</script>
  </head>
  <body>
    <!-- In-app browser detection banner -->
    <div id="inapp-banner" style="display:none;position:fixed;top:0;left:0;right:0;z-index:9999;background:#fffbeb;border-bottom:1px solid #f59e0b;padding:12px 16px;text-align:center;font-size:13px;color:#92400e;">
      <p style="margin:0 0 6px;font-weight:600;">請使用瀏覽器 (Chrome, Safari) 才能使用本網站完整功能</p>
      <p style="margin:0 0 8px;font-size:12px;color:#a16207;">目前您正在使用 <span id="inapp-name">應用程式</span> 內建瀏覽器，部分功能可能受限</p>
      <button id="inapp-copy-btn" style="display:inline-flex;align-items:center;gap:4px;padding:6px 16px;border:1px solid #f59e0b;border-radius:6px;background:#fff;color:#92400e;font-size:12px;font-weight:600;cursor:pointer;" type="button">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        複製網址到瀏覽器開啟
      </button>
    </div>
    <script>
    (function(){
      var ua = navigator.userAgent || "";
      var isLine = /\bLine\b/i.test(ua);
      var isFB = /\bFBAV\b/i.test(ua) || /\bFB_IAB\b/i.test(ua);
      var isIG = /\bInstagram\b/i.test(ua);
      var appName = isLine ? "LINE" : isFB ? "Facebook" : isIG ? "Instagram" : "";
      if (!appName) return;
      var banner = document.getElementById("inapp-banner");
      if (banner) {
        banner.style.display = "block";
        var nameEl = document.getElementById("inapp-name");
        if (nameEl) nameEl.textContent = appName;
        document.body.style.paddingTop = banner.offsetHeight + "px";
      }
      var btn = document.getElementById("inapp-copy-btn");
      if (btn) {
        btn.addEventListener("click", function() {
          var url = location.href;
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(url).then(function() { btn.textContent = "已複製！"; setTimeout(function() { btn.innerHTML = '複製網址到瀏覽器開啟'; }, 2000); });
          } else {
            var ta = document.createElement("textarea");
            ta.value = url; ta.style.position = "fixed"; ta.style.opacity = "0";
            document.body.appendChild(ta); ta.select();
            try { document.execCommand("copy"); btn.textContent = "已複製！"; setTimeout(function() { btn.innerHTML = '複製網址到瀏覽器開啟'; }, 2000); } catch(e) {}
            document.body.removeChild(ta);
          }
        });
      }
    })();
    </script>
    <div id="loading-overlay" class="loading-overlay" aria-live="polite" aria-label="載入中">
      <svg class="loading-logo" viewBox="0 0 620 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="VOVOSnap">
        <text class="loading-letter" x="10" y="130" style="animation-delay: 0s">V</text>
        <text class="loading-letter" x="85" y="130" style="animation-delay: 0.07s">O</text>
        <text class="loading-letter" x="170" y="130" style="animation-delay: 0.14s">V</text>
        <text class="loading-letter" x="245" y="130" style="animation-delay: 0.21s">O</text>
        <text class="loading-letter" x="330" y="130" style="animation-delay: 0.28s;fill:#6366f1;">S</text>
        <text class="loading-letter" x="400" y="130" style="animation-delay: 0.35s;fill:#6366f1;">n</text>
        <text class="loading-letter" x="465" y="130" style="animation-delay: 0.42s;fill:#6366f1;">a</text>
        <text class="loading-letter" x="530" y="130" style="animation-delay: 0.49s;fill:#6366f1;">p</text>
        <circle class="loading-dot" cx="590" cy="55" r="5" style="animation-delay: 0.2s" />
        <circle class="loading-dot" cx="575" cy="40" r="3" style="animation-delay: 0.4s" />
        <path class="loading-sparkle" d="M50 30 L53 40 L63 43 L53 46 L50 56 L47 46 L37 43 L47 40Z" style="animation-delay: 0.5s" />
        <text class="loading-subtitle" x="310" y="175">📸</text>
      </svg>
      <p class="loading-hint">商品載入中</p>
    </div>

    <header class="page-header">
      <div class="container">
        <div class="header-top">
          <div class="header-left">
            <h1 id="store-header-name">商品列表</h1>
            <p id="store-desc" class="store-desc" style="display:none;"></p>
            <a href="/" style="font-size:11px;color:#6366f1;text-decoration:none;font-weight:600;">vovosnap</a>
            <p id="last-updated-text" class="meta">資料載入中...</p>
          </div>
          <div class="header-right">
            <img id="store-logo" class="store-logo-header" style="display:none;" alt="商店 Logo" />
            <button class="hamburger-btn" id="hamburger-btn" aria-label="篩選選單">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
          </div>
        </div>
        <div id="promo-switch" class="view-switch" aria-label="優惠篩選切換"></div>
      </div>
    </header>

    <!-- Drawer overlay -->
    <div class="drawer-overlay" id="drawer-overlay"></div>
    <!-- Drawer -->
    <aside class="drawer" id="drawer">
      <div class="drawer-header">
        <h2 id="drawer-title"><img id="drawer-logo" class="drawer-logo" style="display:none;" alt="" /><span>篩選</span></h2>
        <button class="drawer-close" id="drawer-close" aria-label="關閉">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="drawer-body">
        <div class="drawer-section">
          <h3 class="drawer-section-title">品牌</h3>
          <div id="brand-filters" class="drawer-filter-list"></div>
        </div>
        <div class="drawer-section">
          <h3 class="drawer-section-title">種類</h3>
          <div id="category-filters" class="drawer-filter-list"></div>
        </div>
      </div>
    </aside>

    <main class="container">
      <section id="list-error" class="notice hidden"></section>
      <section id="product-grid" class="product-grid" aria-live="polite"></section>
      <section id="pagination" class="pagination hidden" aria-live="polite" style="display:none;">
        <button id="page-prev" class="btn-pill secondary" type="button" style="display:none;">&larr;</button>
        <p id="page-indicator" class="meta"></p>
        <button id="page-next" class="btn-pill secondary" type="button" style="display:none;">&rarr;</button>
      </section>
    </main>
    <!-- Old promo popup removed. Use admin popup-ads carousel instead. -->
    <div class="floating-nav-buttons" aria-label="分頁快捷按鈕">
      <button id="float-page-prev" class="floating-nav-btn" type="button" aria-label="上一頁">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button id="float-page-next" class="floating-nav-btn" type="button" aria-label="下一頁">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>
      </button>
    </div>
    <a class="floating-request-btn" href="/request.html" aria-label="購物車">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      <span class="floating-cart-badge" id="floating-draft-count" style="display:none;">0</span>
    </a>

    <script>
    var h = document.getElementById("store-header-name");
    if (h && window.__STORE_NAME) h.textContent = window.__STORE_NAME;
    if (window.__STORE_DESC) {
      var descEl = document.getElementById("store-desc");
      if (descEl) { descEl.textContent = window.__STORE_DESC; descEl.style.display = "block"; }
    }
    // Render store logo
    var ds = window.__DISPLAY_SETTINGS || {};
    if (ds.storeLogo) {
      var logoSrc = (window.__API_BASE || "") + "/api/images/" + ds.storeLogo;
      var logoEl = document.getElementById("store-logo");
      if (logoEl) { logoEl.src = logoSrc; logoEl.style.display = "block"; }
      var drawerLogo = document.getElementById("drawer-logo");
      if (drawerLogo) { drawerLogo.src = logoSrc; drawerLogo.style.display = "inline-block"; }
      var drawerTitle = document.getElementById("drawer-title");
      if (drawerTitle) { var span = drawerTitle.querySelector("span"); if (span) span.style.display = "none"; }
    }
    // Drawer toggle
    (function() {
      var btn = document.getElementById("hamburger-btn");
      var drawer = document.getElementById("drawer");
      var overlay = document.getElementById("drawer-overlay");
      var close = document.getElementById("drawer-close");
      function open() { drawer.classList.add("open"); overlay.classList.add("open"); document.body.style.overflow = "hidden"; }
      function shut() { drawer.classList.remove("open"); overlay.classList.remove("open"); document.body.style.overflow = ""; }
      if (btn) btn.addEventListener("click", open);
      if (close) close.addEventListener("click", shut);
      if (overlay) overlay.addEventListener("click", shut);
    })();
    // Render promo filter buttons from admin display settings
    var promos = ds.promoFilters || [];
    // Render promo filters only if enabled
    var promoEl = document.getElementById("promo-switch");
    if (promoEl && ds.promoEnabled !== false && promos.length > 0) {
      promoEl.innerHTML = promos
        .filter(function(p) { return typeof p === "string" ? true : p.enabled !== false; })
        .map(function(p) {
          var val = typeof p === "string" ? p : p.value;
          var label = typeof p === "string" ? (p === "all" ? "一般" : "&lt;" + p) : (p.label || p.value);
          return '<button type="button" class="btn-pill secondary view-switch__btn" data-promo-max="' + val + '">' + label + '</button>';
        }).join("");
    } else if (promoEl) {
      promoEl.style.display = "none";
    }
    </script>
    <!-- Popup ad carousel -->
    <div id="popup-ad-overlay" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;">
      <div style="position:relative;max-width:90vw;max-height:80vh;">
        <img id="popup-ad-img" style="max-width:100%;max-height:80vh;border-radius:10px;" />
        <button onclick="closePopupAd()" style="position:absolute;top:-12px;right:-12px;width:32px;height:32px;border-radius:50%;background:#fff;border:1px solid #ddd;font-size:18px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.15);">×</button>
      </div>
    </div>
    <script>
    (function() {
      var base = window.__API_BASE || "";
      fetch(base + "/api/admin/popup-ads").then(function(r){return r.json()}).then(function(d) {
        if (!d.ok || !d.images || !d.images.length) return;
        var images = d.images;
        var interval = (d.interval || 0.5) * 1000;
        var overlay = document.getElementById("popup-ad-overlay");
        var img = document.getElementById("popup-ad-img");
        var idx = 0;
        overlay.style.display = "flex";
        img.src = base + "/api/images/" + images[0];
        if (images.length > 1) {
          setInterval(function() {
            idx = (idx + 1) % images.length;
            img.src = base + "/api/images/" + images[idx];
          }, interval);
        }
      });
    })();
    function closePopupAd() {
      document.getElementById("popup-ad-overlay").style.display = "none";
    }
    </script>
    <script type="module" src="/assets/app-list.js"></script>
  </body>
</html>
