<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vovosnap 商品列表</title>
    <link rel="icon" type="image/png" href="/assets/images/logo-3.png" />
    <link rel="stylesheet" href="/assets/styles.css" />
    <link rel="stylesheet" href="/assets/templates.css" />
    <script>if (!window.apiFetch) window.apiFetch = function(p, o) { return fetch((window.__API_BASE || '') + p, o); };</script>
  </head>
  <body>
    <div id="loading-overlay" class="loading-overlay" aria-live="polite" aria-label="載入中">
      <div class="loading-bar-wrap">
        <div class="loading-bar"></div>
      </div>
    </div>

    <header class="page-header">
      <div class="container">
        <div class="header-top">
          <div class="header-left">
            <a href="/" id="store-logo-link"><img id="store-logo" class="store-logo-header" src="/assets/images/logo2.png" alt="商店 Logo" /></a>
            <div>
              <h1 id="store-header-name">商品列表</h1>
              <p id="store-desc" class="store-desc" style="display:none;"></p>
            </div>
          </div>
          <div class="header-right">
            <button class="hamburger-btn" id="hamburger-btn" aria-label="篩選選單">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
          </div>
        </div>
      </div>
      <div id="deadline-countdown" class="deadline-countdown" style="display:none;"></div>
    </header>

    <!-- Drawer overlay -->
    <div class="drawer-overlay" id="drawer-overlay"></div>
    <!-- Drawer -->
    <aside class="drawer" id="drawer">
      <div class="drawer-header">
        <button class="drawer-close" id="drawer-close" aria-label="關閉">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="drawer-body">
        <div class="drawer-section">
          <h3 class="drawer-section-title">品牌</h3>
          <div id="brand-filters" class="drawer-filter-list"></div>
        </div>
        <div class="drawer-section">
          <h3 class="drawer-section-title">種類</h3>
          <div id="category-filters" class="drawer-filter-list"></div>
        </div>
        <div class="drawer-section" id="promo-drawer-section" data-promo-section="mobile" style="display:none;">
          <h3 class="drawer-section-title">價格篩選</h3>
          <div id="promo-switch" class="view-switch" aria-label="價格篩選切換" data-promo-switch="mobile" style="flex-wrap:wrap;gap:6px;"></div>
        </div>
      </div>
    </aside>

    <!-- Banner carousel -->
    <style>#banner-carousel{height:280px}#banner-carousel .banner-slide{height:280px}#banner-carousel .banner-nav-btn{display:none}@media(min-width:768px){#banner-carousel{height:420px}#banner-carousel .banner-slide{height:420px}#banner-carousel .banner-nav-btn{display:block}}</style>
    <div id="banner-carousel" style="display:none;position:relative;width:100%;overflow:hidden;background:#f5f5f5;">
      <div id="banner-track" style="display:flex;transition:transform 0.3s ease;width:100%;">
      </div>
      <button id="banner-prev" class="banner-nav-btn" onclick="slideBanner(-1)" style="position:absolute;left:8px;top:50%;transform:translateY(-50%);width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.85);border:1px solid #ddd;font-size:18px;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,0.1);z-index:2;">&#8249;</button>
      <button id="banner-next" class="banner-nav-btn" onclick="slideBanner(1)" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.85);border:1px solid #ddd;font-size:18px;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,0.1);z-index:2;">&#8250;</button>
      <div id="banner-dots" style="position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:2;"></div>
    </div>
    <script>
    (function() {
      var bs = window.__BANNER_SETTINGS || {};
      if (!bs.enabled || !bs.images || !bs.images.length) return;
      var base = window.__API_BASE || "";
      var carousel = document.getElementById("banner-carousel");
      var track = document.getElementById("banner-track");
      var dots = document.getElementById("banner-dots");
      if (!carousel || !track) return;

      var images = bs.images;
      track.innerHTML = images.map(function(img) {
        return '<div class="banner-slide" style="min-width:100%;flex-shrink:0;"><img src="' + base + '/api/images/' + img + '" style="width:100%;height:100%;object-fit:cover;display:block;" alt="商店橫幅" /></div>';
      }).join("");

      carousel.style.display = "block";
      var idx = 0;

      // Dots
      if (images.length > 1) {
        dots.innerHTML = images.map(function(_, i) {
          return '<span data-dot="' + i + '" style="width:8px;height:8px;border-radius:50%;background:' + (i === 0 ? '#333' : 'rgba(0,0,0,0.3)') + ';cursor:pointer;transition:background 0.2s;"></span>';
        }).join("");
      }

      function goTo(n) {
        idx = Math.max(0, Math.min(images.length - 1, n));
        track.style.transform = "translateX(-" + (idx * 100) + "%)";
        var allDots = dots.querySelectorAll("span");
        allDots.forEach(function(d, i) { d.style.background = i === idx ? "#333" : "rgba(0,0,0,0.3)"; });
      }
      window.slideBanner = function(dir) { goTo(idx + dir); };

      // Touch/swipe support
      var startX = 0, startY = 0, dragging = false;
      track.addEventListener("touchstart", function(e) { startX = e.touches[0].clientX; startY = e.touches[0].clientY; dragging = true; }, { passive: true });
      track.addEventListener("touchmove", function(e) { /* allow default scroll */ }, { passive: true });
      track.addEventListener("touchend", function(e) {
        if (!dragging) return;
        dragging = false;
        var dx = e.changedTouches[0].clientX - startX;
        var dy = e.changedTouches[0].clientY - startY;
        if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
          goTo(idx + (dx < 0 ? 1 : -1));
        }
      });
    })();
    </script>

    <main class="container storefront-layout">
      <aside class="store-sidebar" aria-label="桌面篩選選單">
        <div class="store-sidebar__panel">
          <div class="store-sidebar__section">
            <h3 class="drawer-section-title">品牌</h3>
            <div class="drawer-filter-list" data-brand-filters="desktop"></div>
          </div>
          <div class="store-sidebar__section">
            <h3 class="drawer-section-title">種類</h3>
            <div class="drawer-filter-list" data-category-filters="desktop"></div>
          </div>
          <div class="store-sidebar__section" data-promo-section="desktop" style="display:none;">
            <h3 class="drawer-section-title">價格篩選</h3>
            <div class="view-switch store-sidebar__promo-switch" aria-label="價格篩選切換" data-promo-switch="desktop"></div>
          </div>
        </div>
      </aside>
      <div class="storefront-content">
        <section id="list-error" class="notice hidden"></section>
        <section id="product-grid" class="product-grid" aria-live="polite"></section>
        <section id="pagination" class="pagination hidden" aria-live="polite" style="display:none;">
          <button id="page-prev" class="btn-pill secondary" type="button" style="display:none;">&larr;</button>
          <p id="page-indicator" class="meta"></p>
          <button id="page-next" class="btn-pill secondary" type="button" style="display:none;">&rarr;</button>
        </section>
        <footer style="text-align:center;padding:24px 0 60px;"><p id="last-updated-text" class="meta" style="font-size:11px;color:#aaa;">資料載入中...</p></footer>
      </div>
    </main>
    <!-- Old promo popup removed. Use admin popup-ads carousel instead. -->
    <div class="floating-nav-buttons" aria-label="分頁快捷按鈕">
      <button id="float-page-prev" class="floating-nav-btn" type="button" aria-label="上一頁">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button id="float-page-next" class="floating-nav-btn" type="button" aria-label="下一頁">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>
      </button>
    </div>
    <a class="floating-request-btn" href="/request.html" aria-label="購物車">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      <span class="floating-cart-badge" id="floating-draft-count" style="display:none;">0</span>
    </a>

    <script type="module">
    import { applyStorefrontFavicon } from "/assets/favicon.js";

    applyStorefrontFavicon({
      displaySettings: window.__DISPLAY_SETTINGS || {},
      apiBase: window.__API_BASE || "",
      fallbackHref: "/assets/images/logo-3.png",
    });
    </script>

    <script>
    var h = document.getElementById("store-header-name");
    if (h && window.__STORE_NAME) h.textContent = window.__STORE_NAME;
    if (window.__STORE_DESC) {
      var descEl = document.getElementById("store-desc");
      if (descEl) { descEl.textContent = window.__STORE_DESC; descEl.style.display = "block"; }
    }
    // Render store logo
    var ds = window.__DISPLAY_SETTINGS || {};
    var base = window.__API_BASE || "";
    var logoLink = document.getElementById("store-logo-link");
    if (logoLink && base) logoLink.href = base + "/";
    if (ds.storeLogo) {
      var logoSrc = base + "/api/images/" + ds.storeLogo;
      var logoEl = document.getElementById("store-logo");
      if (logoEl) logoEl.src = logoSrc;
    }
    // Fix floating request button href
    (function() {
      var base = window.__API_BASE || "";
      var reqBtn = document.querySelector(".floating-request-btn");
      if (reqBtn) reqBtn.href = base + "/request.html";
    })();
    // Deadline countdown
    (function() {
      if (!ds.deadlineEnabled || !ds.deadlineTime) return;
      var el = document.getElementById("deadline-countdown");
      if (!el) return;
      var deadline = new Date(ds.deadlineTime).getTime();
      function tick() {
        var now = Date.now();
        var diff = deadline - now;
        if (diff <= 0) { el.textContent = "代購已截止"; return; }
        var d = Math.floor(diff / 86400000);
        var hr = Math.floor((diff % 86400000) / 3600000);
        var min = Math.floor((diff % 3600000) / 60000);
        var sec = Math.floor((diff % 60000) / 1000);
        var parts = [];
        if (d > 0) parts.push(d + " 天");
        parts.push(String(hr).padStart(2, "0") + ":" + String(min).padStart(2, "0") + ":" + String(sec).padStart(2, "0"));
        el.textContent = "代購截止倒數 " + parts.join(" ");
        requestAnimationFrame(function() { setTimeout(tick, 1000); });
      }
      el.style.display = "";
      tick();
    })();
    // Drawer toggle
    (function() {
      var btn = document.getElementById("hamburger-btn");
      var drawer = document.getElementById("drawer");
      var overlay = document.getElementById("drawer-overlay");
      var close = document.getElementById("drawer-close");
      function open() { drawer.classList.add("open"); overlay.classList.add("open"); document.body.style.overflow = "hidden"; }
      function shut() { drawer.classList.remove("open"); overlay.classList.remove("open"); document.body.style.overflow = ""; }
      if (btn) btn.addEventListener("click", open);
      if (close) close.addEventListener("click", shut);
      if (overlay) overlay.addEventListener("click", shut);
    })();
    // Render promo filter buttons inside drawer
    var promos = ds.promoFilters || [];
    var promoTargets = Array.from(document.querySelectorAll("[data-promo-switch]"));
    var promoSections = Array.from(document.querySelectorAll("[data-promo-section]"));
    if (promoTargets.length > 0 && ds.promoEnabled && promos.length > 0) {
      var promoHtml = promos
        .filter(function(p) { return typeof p === "string" ? true : p.enabled !== false; })
        .map(function(p) {
          var val = typeof p === "string" ? p : p.value;
          var label = typeof p === "string" ? (p === "all" ? "一般" : "&lt;" + p) : (p.label || p.value);
          return '<button type="button" class="btn-pill secondary view-switch__btn" data-promo-max="' + val + '">' + label + '</button>';
        }).join("");
      promoTargets.forEach(function(el) { el.innerHTML = promoHtml; });
      promoSections.forEach(function(el) { el.style.display = ""; });
    } else {
      promoTargets.forEach(function(el) { el.innerHTML = ""; });
      promoSections.forEach(function(el) { el.style.display = "none"; });
    }
    </script>
    <!-- Popup ad carousel -->
    <div id="popup-ad-overlay" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;">
      <div style="position:relative;max-width:90vw;max-height:80vh;">
        <img id="popup-ad-img" style="max-width:100%;max-height:80vh;border-radius:10px;" />
        <button onclick="closePopupAd()" style="position:absolute;top:-12px;right:-12px;width:32px;height:32px;border-radius:50%;background:#fff;border:1px solid #ddd;font-size:18px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.15);">×</button>
      </div>
    </div>
    <script>
    (function() {
      var base = window.__API_BASE || "";
      var slug = window.__STORE_SLUG || "default";
      var adKey = "vovosnap-popup-seen-" + slug;
      if (localStorage.getItem(adKey)) return;
      fetch(base + "/api/admin/popup-ads").then(function(r){return r.json()}).then(function(d) {
        if (!d.ok || !d.images || !d.images.length) return;
        var images = d.images;
        var interval = (d.interval || 2) * 1000;
        var maxRounds = 3;
        var overlay = document.getElementById("popup-ad-overlay");
        var img = document.getElementById("popup-ad-img");
        var idx = 0;
        overlay.style.display = "flex";
        img.src = base + "/api/images/" + images[0];
        if (images.length > 1) {
          var remaining = images.length * maxRounds - 1;
          var tid = setInterval(function() {
            idx = (idx + 1) % images.length;
            img.src = base + "/api/images/" + images[idx];
            if (--remaining <= 0) clearInterval(tid);
          }, interval);
        }
      });
      window._popupAdKey = adKey;
    })();
    function closePopupAd() {
      document.getElementById("popup-ad-overlay").style.display = "none";
      if (window._popupAdKey) localStorage.setItem(window._popupAdKey, "1");
    }
    </script>
    <script type="module" src="/assets/app-list.js"></script>
  </body>
</html>
