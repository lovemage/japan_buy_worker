<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vovosnap 商品列表</title>
    <link rel="stylesheet" href="/assets/styles.css" />
    <link rel="stylesheet" href="/assets/templates.css" />
    <script>if (!window.apiFetch) window.apiFetch = function(p, o) { return fetch((window.__API_BASE || '') + p, o); };</script>
  </head>
  <body>
    <div id="loading-overlay" class="loading-overlay" aria-live="polite" aria-label="載入中">
      <svg class="loading-logo" viewBox="0 0 620 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="VOVOSnap">
        <text class="loading-letter" x="10" y="130" style="animation-delay: 0s">V</text>
        <text class="loading-letter" x="85" y="130" style="animation-delay: 0.07s">O</text>
        <text class="loading-letter" x="170" y="130" style="animation-delay: 0.14s">V</text>
        <text class="loading-letter" x="245" y="130" style="animation-delay: 0.21s">O</text>
        <text class="loading-letter" x="330" y="130" style="animation-delay: 0.28s;fill:#6366f1;">S</text>
        <text class="loading-letter" x="400" y="130" style="animation-delay: 0.35s;fill:#6366f1;">n</text>
        <text class="loading-letter" x="465" y="130" style="animation-delay: 0.42s;fill:#6366f1;">a</text>
        <text class="loading-letter" x="530" y="130" style="animation-delay: 0.49s;fill:#6366f1;">p</text>
        <circle class="loading-dot" cx="590" cy="55" r="5" style="animation-delay: 0.2s" />
        <circle class="loading-dot" cx="575" cy="40" r="3" style="animation-delay: 0.4s" />
        <path class="loading-sparkle" d="M50 30 L53 40 L63 43 L53 46 L50 56 L47 46 L37 43 L47 40Z" style="animation-delay: 0.5s" />
        <text class="loading-subtitle" x="310" y="175">📸</text>
      </svg>
      <p class="loading-hint">商品載入中</p>
    </div>

    <header class="page-header">
      <div class="container">
        <h1 id="store-header-name">商品列表</h1>
        <a href="/" style="font-size:11px;color:#6366f1;text-decoration:none;font-weight:600;">vovosnap</a>
        <p id="last-updated-text" class="meta">資料載入中...</p>
        <div id="promo-switch" class="view-switch" aria-label="優惠篩選切換"></div>
        <section id="brand-filters" class="category-filters brand-filters"></section>
        <section id="category-filters" class="category-filters"></section>
      </div>
    </header>

    <main class="container">
      <section id="list-error" class="notice hidden"></section>
      <section id="product-grid" class="product-grid" aria-live="polite"></section>
      <section id="pagination" class="pagination hidden" aria-live="polite">
        <button id="page-prev" class="btn-pill secondary" type="button">&larr; 上一頁</button>
        <p id="page-indicator" class="meta"></p>
        <button id="page-next" class="btn-pill secondary" type="button">下一頁 &rarr;</button>
      </section>
    </main>
    <!-- Old promo popup removed. Use admin popup-ads carousel instead. -->
    <div class="floating-nav-buttons" aria-label="分頁快捷按鈕">
      <button id="float-page-prev" class="btn-pill secondary" type="button">&larr; 上一頁</button>
      <button id="float-page-next" class="btn-pill secondary" type="button">下一頁 &rarr;</button>
    </div>
    <a class="floating-request-btn" href="/request.html">
      需求單（<span id="floating-draft-count">0</span>）
    </a>

    <script>
    var h = document.getElementById("store-header-name");
    if (h && window.__STORE_NAME) h.textContent = window.__STORE_NAME;
    // Render promo filter buttons from admin display settings
    var ds = window.__DISPLAY_SETTINGS || {};
    var promos = ds.promoFilters || [];
    // Render promo filters only if enabled
    var promoEl = document.getElementById("promo-switch");
    if (promoEl && ds.promoEnabled !== false && promos.length > 0) {
      promoEl.innerHTML = promos
        .filter(function(p) { return typeof p === "string" ? true : p.enabled !== false; })
        .map(function(p) {
          var val = typeof p === "string" ? p : p.value;
          var label = typeof p === "string" ? (p === "all" ? "一般" : "&lt;" + p) : (p.label || p.value);
          return '<button type="button" class="btn-pill secondary view-switch__btn" data-promo-max="' + val + '">' + label + '</button>';
        }).join("");
    } else if (promoEl) {
      promoEl.style.display = "none";
    }
    </script>
    <!-- Popup ad carousel -->
    <div id="popup-ad-overlay" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;">
      <div style="position:relative;max-width:90vw;max-height:80vh;">
        <img id="popup-ad-img" style="max-width:100%;max-height:80vh;border-radius:10px;" />
        <button onclick="closePopupAd()" style="position:absolute;top:-12px;right:-12px;width:32px;height:32px;border-radius:50%;background:#fff;border:1px solid #ddd;font-size:18px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.15);">×</button>
      </div>
    </div>
    <script>
    (function() {
      var base = window.__API_BASE || "";
      fetch(base + "/api/admin/popup-ads").then(function(r){return r.json()}).then(function(d) {
        if (!d.ok || !d.images || !d.images.length) return;
        var images = d.images;
        var interval = (d.interval || 0.5) * 1000;
        var overlay = document.getElementById("popup-ad-overlay");
        var img = document.getElementById("popup-ad-img");
        var idx = 0;
        overlay.style.display = "flex";
        img.src = base + "/api/images/" + images[0];
        if (images.length > 1) {
          setInterval(function() {
            idx = (idx + 1) % images.length;
            img.src = base + "/api/images/" + images[idx];
          }, interval);
        }
      });
    })();
    function closePopupAd() {
      document.getElementById("popup-ad-overlay").style.display = "none";
    }
    </script>
    <script type="module" src="/assets/app-list.js"></script>
  </body>
</html>
