<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>vovosnap — 平台管理</title>
<style>
/* ── Tokens ── */
:root {
  --pa-accent: #6366f1;
  --pa-accent-light: #ede9fe;
  --pa-accent-hover: #4f46e5;
  --pa-bg: #f8f9fa;
  --pa-card: #fff;
  --pa-text: #1a1a1a;
  --pa-muted: #888;
  --pa-line: #e5e7eb;
  --pa-radius: 10px;
  --pa-radius-sm: 6px;
  --pa-radius-pill: 20px;
  --pa-ease: cubic-bezier(0.25, 1, 0.5, 1);
  --pa-fast: 150ms var(--pa-ease);
  --pa-normal: 250ms var(--pa-ease);
  --pa-green: #166534;
  --pa-green-bg: #dcfce7;
  --pa-amber: #92400e;
  --pa-amber-bg: #fef3c7;
  --pa-red: #991b1b;
  --pa-red-bg: #fee2e2;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: var(--pa-text); background: var(--pa-bg); padding-bottom: 72px; -webkit-tap-highlight-color: transparent; }

/* ── Login ── */
.login-wrap { max-width: 360px; margin: 80px auto; padding: 32px; background: var(--pa-card); border-radius: var(--pa-radius); border: 1px solid var(--pa-line); }
.login-wrap h1 { font-size: 20px; margin-bottom: 4px; }
.login-wrap h1 span { color: var(--pa-accent); }
.login-wrap .sub { font-size: 13px; color: var(--pa-muted); margin-bottom: 16px; }
.login-wrap input { width: 100%; padding: 10px 12px; border: 1.5px solid #ddd; border-radius: var(--pa-radius-sm); font-size: 14px; margin-bottom: 12px; transition: border-color var(--pa-fast); outline: none; }
.login-wrap input:focus { border-color: var(--pa-accent); box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
.login-wrap button { width: 100%; padding: 10px; background: var(--pa-text); color: #fff; border: none; border-radius: var(--pa-radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; transition: all var(--pa-fast); }
.login-wrap button:hover { background: #333; }
.login-wrap button:active { transform: scale(0.98); }
.login-wrap .error { color: #ef4444; font-size: 13px; margin-bottom: 8px; display: none; }

/* ── Dashboard ── */
.dashboard { display: none; }
.dashboard.active { display: block; }
.page-content { max-width: 1100px; margin: 0 auto; padding: 16px; animation: fadeUp 0.2s ease-out; }
.page-content.hidden { display: none; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* ── Header ── */
.header { background: var(--pa-card); border-bottom: 1px solid var(--pa-line); padding: 12px 16px; position: sticky; top: 0; z-index: 50; }
.header-inner { max-width: 1100px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 18px; font-weight: 700; }
.header h1 span { color: var(--pa-accent); }
.header .logout-btn { padding: 6px 14px; background: #f5f5f5; border: none; border-radius: var(--pa-radius-sm); cursor: pointer; font-size: 12px; color: #666; transition: background var(--pa-fast); }
.header .logout-btn:hover { background: #eee; }

/* ── Stats ── */
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.stat-card { background: var(--pa-card); border-radius: var(--pa-radius); padding: 16px; border: 1px solid var(--pa-line); text-align: center; transition: box-shadow var(--pa-fast); }
.stat-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.stat-num { font-size: 28px; font-weight: 800; }
.stat-label { font-size: 12px; color: var(--pa-muted); margin-top: 2px; }
.stat-card--revenue { grid-column: 1 / -1; }
.stat-card--revenue .stat-num { color: #16a34a; }

/* ── Cards ── */
.card { background: var(--pa-card); border-radius: var(--pa-radius); padding: 16px; border: 1px solid var(--pa-line); margin-bottom: 12px; }
.card h3 { font-size: 15px; font-weight: 700; margin-bottom: 10px; }
.card label { display: block; font-size: 12px; font-weight: 600; color: #666; margin-bottom: 4px; }
.card input[type="password"], .card input[type="text"], .card input[type="number"], .card textarea { width: 100%; padding: 8px 10px; border: 1.5px solid #ddd; border-radius: var(--pa-radius-sm); font-size: 13px; margin-bottom: 8px; transition: border-color var(--pa-fast); outline: none; }
.card input:focus, .card textarea:focus { border-color: var(--pa-accent); box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
.card textarea { resize: vertical; font-family: monospace; }
.card .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.card .desc { font-size: 12px; color: var(--pa-muted); margin-bottom: 10px; }
.card .divider { border: none; border-top: 1px solid var(--pa-line); margin: 16px 0; }

/* ── Buttons ── */
.btn { padding: 8px 18px; border: none; border-radius: var(--pa-radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; transition: all var(--pa-fast); }
.btn:active { transform: scale(0.97); }
.btn-dark { background: var(--pa-text); color: #fff; }
.btn-dark:hover { background: #333; }

/* ── Toast ── */
.toast { font-size: 12px; color: #16a34a; margin-left: 8px; display: none; }
.toast[style*="inline"] { animation: toastIn 0.3s ease-out; }
@keyframes toastIn { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; transform: translateY(0); } }

/* ── Pill filter (shared) ── */
.pill-filters { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
.pill-btn { padding: 5px 12px; border: 1.5px solid var(--pa-line); background: var(--pa-card); border-radius: var(--pa-radius-pill); font-size: 12px; cursor: pointer; font-family: inherit; transition: all var(--pa-fast); }
.pill-btn:hover { border-color: #bbb; background: #fafafa; }
.pill-btn:active { transform: scale(0.95); }
.pill-btn.active { background: var(--pa-text); color: #fff; border-color: var(--pa-text); }

/* ── Member list ── */
.member-list { display: flex; flex-direction: column; gap: 8px; }
.member-card { background: var(--pa-card); border: 1px solid var(--pa-line); border-radius: var(--pa-radius); padding: 14px; transition: box-shadow var(--pa-fast); }
.member-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
.member-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; gap: 8px; }
.member-name { font-size: 14px; font-weight: 700; }
.member-email { font-size: 12px; color: var(--pa-muted); }
.member-meta { display: flex; gap: 16px; flex-wrap: wrap; font-size: 12px; color: #666; }
.member-meta span { display: flex; align-items: center; gap: 4px; }
.member-meta a { color: var(--pa-accent); text-decoration: none; }
.member-meta a:hover { text-decoration: underline; }
.member-actions { margin-top: 10px; display: flex; gap: 6px; flex-wrap: wrap; }
.member-actions button { padding: 5px 12px; border: 1.5px solid var(--pa-line); background: var(--pa-card); border-radius: var(--pa-radius-sm); font-size: 11px; font-weight: 500; cursor: pointer; font-family: inherit; transition: all var(--pa-fast); }
.member-actions button:hover { background: #f5f5f5; border-color: #ccc; }
.member-actions button:active { transform: scale(0.95); }
.member-actions button.active-plan { background: var(--pa-text); color: #fff; border-color: var(--pa-text); }
.member-actions button.is-test { background: var(--pa-amber-bg); color: var(--pa-amber); border-color: #f59e0b; }

/* ── Member expires ── */
.member-expires { font-size: 11px; margin-top: 4px; }
.member-expires .active { color: var(--pa-green); }
.member-expires .expired { color: var(--pa-red); }

/* ── Badges ── */
.badge { display: inline-block; padding: 2px 8px; border-radius: var(--pa-radius-pill); font-size: 11px; font-weight: 600; }
.badge-free { background: #f3f4f6; color: #6b7280; }
.badge-starter { background: #dbeafe; color: #1d4ed8; }
.badge-pro { background: var(--pa-accent-light); color: #6d28d9; }
.badge-active { background: var(--pa-green-bg); color: var(--pa-green); }
.badge-onboarding { background: var(--pa-amber-bg); color: var(--pa-amber); }
.badge-inactive { background: var(--pa-red-bg); color: var(--pa-red); }
.badge-test { background: var(--pa-amber-bg); color: var(--pa-amber); }

/* ── Bottom nav ── */
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--pa-card); border-top: 1px solid var(--pa-line); display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 8px 0 6px; cursor: pointer; border: none; background: none; color: #999; font-size: 10px; font-family: inherit; gap: 2px; transition: color var(--pa-fast); }
.nav-item:active { opacity: 0.7; }
.nav-item.active { color: var(--pa-accent); }
.nav-item svg { width: 22px; height: 22px; }

/* ── Revenue log ── */
.revenue-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
.revenue-header strong { font-size: 14px; }
.revenue-header select, .log-card select { padding: 6px 10px; border: 1.5px solid #ddd; border-radius: var(--pa-radius-sm); font-size: 13px; font-family: inherit; background: var(--pa-card); cursor: pointer; transition: border-color var(--pa-fast); outline: none; }
.revenue-header select:focus, .log-card select:focus { border-color: var(--pa-accent); }
.log-card { background: var(--pa-card); border: 1px solid var(--pa-line); border-radius: var(--pa-radius); padding: 12px 14px; margin-bottom: 6px; display: flex; align-items: center; gap: 12px; transition: box-shadow var(--pa-fast); }
.log-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
.log-card .log-info { flex: 1; min-width: 0; }
.log-card .log-name { font-size: 13px; font-weight: 600; }
.log-card .log-meta { font-size: 11px; color: var(--pa-muted); margin-top: 2px; }
.log-card .log-amount { font-size: 16px; font-weight: 800; white-space: nowrap; min-width: 80px; text-align: right; }
.log-card .log-amount.zero { color: #bbb; text-decoration: line-through; }
.log-card select { padding: 4px 8px; font-size: 11px; }
.log-status-normal { color: var(--pa-green); }
.log-status-pending { color: #d97706; }
.log-status-cancelled { color: var(--pa-red); }
.log-empty { font-size: 13px; color: var(--pa-muted); text-align: center; padding: 24px 16px; }

/* ── Plan modal ── */
.plan-modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0); z-index: 200; display: flex; align-items: center; justify-content: center; animation: backdropIn 0.2s ease forwards; }
@keyframes backdropIn { to { background: rgba(0,0,0,0.4); } }
.plan-modal { background: var(--pa-card); border-radius: 14px; padding: 24px; width: 340px; max-width: 90vw; animation: modalIn 0.25s var(--pa-ease); box-shadow: 0 16px 48px rgba(0,0,0,0.15); }
@keyframes modalIn { from { opacity: 0; transform: translateY(16px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
.plan-modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 12px; }
.plan-modal .meta { font-size: 12px; color: var(--pa-muted); margin-bottom: 14px; }
.plan-modal label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; }
.plan-modal input { width: 100%; padding: 10px 12px; border: 1.5px solid #ddd; border-radius: var(--pa-radius-sm); font-size: 16px; text-align: center; margin-bottom: 14px; outline: none; transition: border-color var(--pa-fast); }
.plan-modal input:focus { border-color: var(--pa-accent); box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
.plan-modal .modal-actions { display: flex; gap: 8px; margin-top: 4px; }
.plan-modal .modal-actions button { flex: 1; padding: 10px; border: none; border-radius: var(--pa-radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all var(--pa-fast); }
.plan-modal .modal-actions button:active { transform: scale(0.97); }
.plan-modal .btn-confirm { background: var(--pa-accent); color: #fff; }
.plan-modal .btn-confirm:hover { background: var(--pa-accent-hover); }
.plan-modal .btn-cancel { background: #f3f4f6; color: #666; }
.plan-modal .btn-cancel:hover { background: #eee; }

/* ── Plan option radio cards ── */
.plan-option { display: flex; align-items: center; gap: 10px; padding: 12px; border: 1.5px solid var(--pa-line); border-radius: var(--pa-radius); cursor: pointer; margin-bottom: 8px; transition: all var(--pa-fast); }
.plan-option:hover { border-color: var(--pa-accent); background: #faf5ff; }
.plan-option:active { transform: scale(0.98); }
.plan-option.selected { border-color: var(--pa-accent); background: var(--pa-accent-light); }
.plan-option .po-radio { width: 18px; height: 18px; border: 2px solid #ccc; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: border-color var(--pa-fast); }
.plan-option.selected .po-radio { border-color: var(--pa-accent); }
.plan-option.selected .po-radio::after { content: ""; width: 10px; height: 10px; border-radius: 50%; background: var(--pa-accent); }
.plan-option .po-info { flex: 1; }
.plan-option .po-title { font-size: 14px; font-weight: 600; }
.plan-option .po-sub { font-size: 11px; color: var(--pa-muted); }
.plan-option .po-price { font-size: 13px; font-weight: 700; color: var(--pa-text); white-space: nowrap; }

/* ── Responsive ── */
@media (max-width: 640px) {
  .stats { grid-template-columns: repeat(2, 1fr); }
  .card .row { grid-template-columns: 1fr; }
  .log-card { flex-wrap: wrap; }
  .log-card .log-amount { width: 100%; text-align: left; }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}
</style>
</head>
<body>

<!-- Login -->
<div id="login-section" class="login-wrap">
  <h1>vovo<span>snap</span></h1>
  <p class="sub">平台管理員登入</p>
  <div class="error" id="login-error"></div>
  <input type="email" id="admin-email" placeholder="管理員 Email" autocomplete="email" onkeydown="if(event.key==='Enter')document.getElementById('admin-password').focus()">
  <input type="password" id="admin-password" placeholder="管理員密碼" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()">
  <button onclick="login()">登入</button>
</div>

<!-- Dashboard -->
<div id="dashboard" class="dashboard">
  <div class="header">
    <div class="header-inner">
      <h1>vovo<span>snap</span></h1>
      <button class="logout-btn" onclick="logout()">登出</button>
    </div>
  </div>

  <!-- Tab: 總覽 -->
  <div class="page-content" id="page-overview">
    <div class="stats">
      <div class="stat-card"><div class="stat-num" id="stat-total">0</div><div class="stat-label">總會員</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-free">0</div><div class="stat-label">Free</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-starter">0</div><div class="stat-label">Starter</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-pro">0</div><div class="stat-label">Pro</div></div>
      <div class="stat-card stat-card--revenue"><div class="stat-num" id="stat-revenue">NT$0</div><div class="stat-label" id="stat-revenue-label">本月總收入</div></div>
    </div>
    <div class="revenue-header">
      <strong>收入紀錄</strong>
      <select id="log-month" onchange="loadRevenueLogs()"></select>
    </div>
    <div class="pill-filters" id="log-filters">
      <button class="pill-btn active" onclick="filterLogs('all',this)">全部</button>
      <button class="pill-btn" onclick="filterLogs('normal',this)">正常</button>
      <button class="pill-btn" onclick="filterLogs('pending',this)">待處理</button>
      <button class="pill-btn" onclick="filterLogs('cancelled',this)">取消</button>
    </div>
    <div id="log-list"></div>
  </div>

  <!-- Tab: 會員 -->
  <div class="page-content hidden" id="page-members">
    <div class="pill-filters" id="member-filters">
      <button class="pill-btn active" onclick="filterStores('all', this)">全部</button>
      <button class="pill-btn" onclick="filterStores('free', this)">Free</button>
      <button class="pill-btn" onclick="filterStores('starter', this)">Starter</button>
      <button class="pill-btn" onclick="filterStores('pro', this)">Pro</button>
      <button class="pill-btn" onclick="filterStores('onboarding', this)">Onboarding</button>
    </div>
    <div class="member-list" id="member-list"></div>
  </div>

  <!-- Tab: API Keys (super-admin only) -->
  <div class="page-content hidden" id="page-keys">
    <div class="card">
      <h3>Gemini API Key</h3>
      <div class="row">
        <div>
          <label>Starter 方案 (Gemini)</label>
          <input type="password" id="api-key-starter" placeholder="Starter Gemini API Key">
          <button class="btn" style="margin-top:8px;font-size:12px;padding:6px 12px;" onclick="fetchGeminiModels('starter')">載入模型列表</button>
        </div>
        <div>
          <label>Pro 方案 (Gemini)</label>
          <input type="password" id="api-key-pro" placeholder="Pro Gemini API Key">
          <button class="btn" style="margin-top:8px;font-size:12px;padding:6px 12px;" onclick="fetchGeminiModels('pro')">載入模型列表</button>
        </div>
      </div>
      <div style="margin-top:12px;padding:10px 12px;background:#f8f8f8;border-radius:6px;display:flex;align-items:center;gap:8px;">
        <span style="font-size:12px;color:#666;">目前模型：</span>
        <strong style="font-size:13px;" id="gemini-selected-model">未選擇</strong>
      </div>
      <div id="gemini-models-section" style="display:none;margin-top:12px;">
        <input type="text" id="gemini-model-search" placeholder="搜尋模型名稱..." style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:13px;margin-bottom:8px;">
        <div id="gemini-model-list" style="max-height:300px;overflow-y:auto;border:1px solid #eee;border-radius:6px;"></div>
        <p style="font-size:11px;color:#999;margin-top:4px;" id="gemini-model-count"></p>
      </div>
    </div>
    <div class="card" style="margin-top:12px;">
      <h3>OpenRouter API Key</h3>
      <div class="row">
        <div>
          <label>Pro 方案 (OpenRouter)</label>
          <input type="password" id="api-key-openrouter-pro" placeholder="Pro OpenRouter API Key">
          <button class="btn" style="margin-top:8px;font-size:12px;padding:6px 12px;" onclick="fetchOpenRouterModels()">載入模型列表</button>
        </div>
      </div>
      <div style="margin-top:12px;padding:10px 12px;background:#f8f8f8;border-radius:6px;display:flex;align-items:center;gap:8px;">
        <span style="font-size:12px;color:#666;">目前模型：</span>
        <strong style="font-size:13px;" id="openrouter-selected-model">未選擇</strong>
      </div>
      <div id="openrouter-models-section" style="display:none;margin-top:12px;">
        <input type="text" id="openrouter-model-search" placeholder="搜尋模型名稱..." style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:13px;margin-bottom:8px;">
        <div id="openrouter-model-list" style="max-height:300px;overflow-y:auto;border:1px solid #eee;border-radius:6px;"></div>
        <p style="font-size:11px;color:#999;margin-top:4px;" id="openrouter-model-count"></p>
      </div>
    </div>
    <button class="btn btn-dark" onclick="saveApiKeys()" style="margin-top:12px;">儲存</button>
    <span class="toast" id="api-key-toast">已儲存</span>
  </div>

  <!-- Tab: 設定 -->
  <div class="page-content hidden" id="page-settings">
    <div class="card">
      <h3>📦 方案商品上限</h3>
      <p class="desc">設定各方案最多可上架的商品數量。此設定也會同步顯示在首頁方案介紹。Pro 設為 -1 代表無限制。</p>
      <div class="row">
        <div>
          <label>Free 上限</label>
          <input type="number" id="limit-free" min="1" value="10">
        </div>
        <div>
          <label>Starter 上限</label>
          <input type="number" id="limit-starter" min="1" value="50">
        </div>
      </div>
      <div style="margin-top:8px;">
        <label>Pro 上限 <span style="font-size:11px;color:var(--pa-muted);">(-1 = 無限制)</span></label>
        <input type="number" id="limit-pro" value="-1" style="width:120px;">
      </div>
      <button class="btn btn-dark" style="margin-top:10px;" onclick="savePlanLimits()">儲存</button>
      <span class="toast" id="plan-limits-toast">已儲存</span>
    </div>

    <div class="card">
      <h3>🤖 AI 辨識 System Prompt</h3>
      <p class="desc">自訂 AI 辨識的系統提示詞。包含違法商品過濾規則。留空使用預設值。</p>
      <textarea id="system-prompt" rows="12"></textarea>
      <button class="btn btn-dark" style="margin-top:8px;" onclick="saveSystemPrompt()">儲存</button>
      <span class="toast" id="prompt-toast">已儲存</span>
    </div>

    <div class="card">
      <button class="btn btn-dark" onclick="logout()">登出</button>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-page="overview" onclick="switchPage('overview', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>總覽</span>
    </button>
    <button class="nav-item" data-page="members" onclick="switchPage('members', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span>會員</span>
    </button>
    <button class="nav-item" data-page="keys" onclick="switchPage('keys', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
      <span>API</span>
    </button>
    <button class="nav-item" data-page="settings" onclick="switchPage('settings', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      <span>設定</span>

</div>

<script>
let adminToken = sessionStorage.getItem("platform_admin_token") || "";
let adminEmail = sessionStorage.getItem("platform_admin_email") || "";
let adminRole = sessionStorage.getItem("platform_admin_role") || "";
let allStores = [];
let testStoreIds = [];
let allLogs = [];
let logFilter = "all";
var TEMPLATES = [
  { id: "default", name: "抹茶暖色" },
  { id: "ink-blue", name: "墨藍" },
  { id: "sand", name: "暖沙灰" },
  { id: "moss", name: "苔蘚灰綠" },
  { id: "slate", name: "石板灰藍" },
  { id: "bold-gold", name: "白黃黑" },
  { id: "bold-ocean", name: "白藍黑" },
];

async function setTemplate(storeId, template) {
  var res = await fetch("/api/platform-admin/stores/" + storeId, {
    method: "PATCH",
    headers: { "content-type": "application/json", authorization: "Bearer " + adminToken },
    body: JSON.stringify({ action: "template", template: template }),
  });
  var data = await res.json();
  if (data.ok) await loadStores();
  else alert(data.error || "操作失敗");
}

async function renameStore(storeId, currentName) {
  var newName = prompt("輸入新名稱：", currentName);
  if (!newName || newName === currentName) return;
  var res = await fetch("/api/platform-admin/stores/" + storeId, {
    method: "PATCH",
    headers: { "content-type": "application/json", authorization: "Bearer " + adminToken },
    body: JSON.stringify({ action: "rename", name: newName }),
  });
  var data = await res.json();
  if (data.ok) await loadStores();
  else alert(data.error || "操作失敗");
}

async function deleteStore(storeId, storeName) {
  if (!confirm("確定要刪除商店「" + storeName + "」？此操作不可復原！")) return;
  var password = prompt("請輸入管理員密碼以確認刪除：");
  if (!password) return;
  var res = await fetch("/api/platform-admin/stores/" + storeId, {
    method: "DELETE",
    headers: { "content-type": "application/json", authorization: "Bearer " + adminToken },
    body: JSON.stringify({ password: password }),
  });
  var data = await res.json();
  if (data.ok) await loadStores();
  else alert(data.error || "刪除失敗");
}

function switchPage(page, btn) {
  document.querySelectorAll(".page-content").forEach(p => p.classList.add("hidden"));
  document.getElementById("page-" + page).classList.remove("hidden");
  document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
  btn.classList.add("active");
}

async function login() {
  const email = document.getElementById("admin-email").value.trim();
  const pw = document.getElementById("admin-password").value;
  const errEl = document.getElementById("login-error");
  errEl.style.display = "none";
  const res = await fetch("/api/platform-admin/login", {
    method: "POST",
    headers: { "content-type": "application/json" },
    body: JSON.stringify({ email, password: pw }),
  });
  const data = await res.json();
  if (data.ok) {
    adminToken = data.token;
    adminEmail = data.email || "";
    adminRole = data.role || "admin";
    sessionStorage.setItem("platform_admin_token", adminToken);
    sessionStorage.setItem("platform_admin_email", adminEmail);
    sessionStorage.setItem("platform_admin_role", adminRole);
    showDashboard();
  } else {
    errEl.textContent = data.error || "密碼錯誤";
    errEl.style.display = "block";
  }
}

function logout() {
  adminToken = "";
  adminEmail = "";
  adminRole = "";
  sessionStorage.removeItem("platform_admin_token");
  sessionStorage.removeItem("platform_admin_email");
  sessionStorage.removeItem("platform_admin_role");
  document.getElementById("login-section").style.display = "";
  document.getElementById("dashboard").classList.remove("active");
}

async function showDashboard() {
  document.getElementById("login-section").style.display = "none";
  document.getElementById("dashboard").classList.add("active");

  // Hide API Keys tab for non-super-admin
  var keysNav = document.querySelector('.nav-item[data-page="keys"]');
  if (adminRole !== "super-admin") {
    if (keysNav) keysNav.style.display = "none";
  } else {
    if (keysNav) keysNav.style.display = "";
  }

  initMonthSelector();
  await loadPlanOffers();
  await loadTestStores();
  await loadStores();
  await loadRevenueLogs();
  if (adminRole === "super-admin") await loadApiKeys();
  await loadSystemPrompt();
  await loadPlanLimits();
}

async function loadTestStores() {
  var res = await fetch("/api/platform-admin/test-stores", { headers: { authorization: "Bearer " + adminToken } });
  var data = await res.json();
  if (data.ok) testStoreIds = data.testStoreIds || [];
}

async function toggleTest(storeId) {
  var res = await fetch("/api/platform-admin/stores/" + storeId + "/test", {
    method: "POST",
    headers: { "content-type": "application/json", authorization: "Bearer " + adminToken },
  });
  var data = await res.json();
  if (data.ok) {
    await loadTestStores();
    await loadStores();
  } else alert(data.error || "操作失敗");
}

async function skipPhonePending(storeId) {
  if (!confirm("確定要幫此會員跳過手機驗證 pending？")) return;
  var res = await fetch("/api/platform-admin/stores/" + storeId, {
    method: "PATCH",
    headers: { "content-type": "application/json", authorization: "Bearer " + adminToken },
    body: JSON.stringify({ action: "skip_phone_pending" }),
  });
  var data = await res.json();
  if (data.ok) await loadStores();
  else alert(data.error || "操作失敗");
}

async function loadStores() {
  const res = await fetch("/api/platform-admin/stores", { headers: { authorization: "Bearer " + adminToken } });
  const data = await res.json();
  if (!data.ok) { if (data.error === "Unauthorized") logout(); return; }
  allStores = data.stores.filter(s => s.id > 0);
  document.getElementById("stat-total").textContent = allStores.length;
  document.getElementById("stat-free").textContent = allStores.filter(s => s.plan === "free").length;
  document.getElementById("stat-starter").textContent = allStores.filter(s => s.plan === "starter").length;
  document.getElementById("stat-pro").textContent = allStores.filter(s => s.plan === "pro").length;
  renderStores(allStores);
}

function filterStores(filter, btn) {
  document.querySelectorAll("#member-filters .pill-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  if (filter === "all") renderStores(allStores);
  else if (filter === "onboarding") renderStores(allStores.filter(s => s.onboarding_step !== "complete"));
  else renderStores(allStores.filter(s => s.plan === filter));
}

function formatExpires(expiresAt) {
  if (!expiresAt) return '';
  var exp = new Date(expiresAt);
  var now = new Date();
  var dateStr = exp.toLocaleDateString("zh-TW");
  if (exp < now) return '<div class="member-expires"><span class="expired">已到期 ' + dateStr + '</span></div>';
  var days = Math.ceil((exp - now) / 86400000);
  return '<div class="member-expires"><span class="active">到期：' + dateStr + '（剩 ' + days + ' 天）</span></div>';
}

function renderStores(stores) {
  document.getElementById("member-list").innerHTML = stores.map(s => {
    var isTest = testStoreIds.indexOf(s.id) >= 0;
    var planClass = "badge-" + s.plan;
    var badges = '<span class="badge ' + planClass + '">' + s.plan.toUpperCase() + '</span> ';
    if (isTest) badges += '<span class="badge badge-test">測試</span> ';
    var statusBadge = s.onboarding_step !== "complete"
      ? '<span class="badge badge-onboarding">' + s.onboarding_step + '</span>'
      : s.is_active ? '<span class="badge badge-active">啟用</span>' : '<span class="badge badge-inactive">停用</span>';
    var created = new Date(s.created_at).toLocaleDateString("zh-TW");

    return '<div class="member-card">' +
      '<div class="member-top">' +
        '<div><div class="member-name">' + s.name + ' <button onclick="renameStore(' + s.id + ',\'' + s.name.replace(/'/g, "\\'") + '\')" style="border:none;background:none;cursor:pointer;font-size:11px;color:var(--pa-muted);">✏️</button></div><div class="member-email">' + s.owner_email + '</div>' + formatExpires(s.plan_expires_at) + '</div>' +
        '<div>' + badges + statusBadge + '</div>' +
      '</div>' +
      '<div class="member-meta">' +
        '<span>🔗 <a href="/s/' + s.slug + '/" target="_blank">' + s.slug + '</a></span>' +
        '<span>📦 ' + (s.product_count || 0) + ' 商品</span>' +
        '<span>📋 ' + (s.order_count || 0) + ' 訂單</span>' +
        '<span>📅 ' + created + '</span>' +
        '<span>🎨 <select onchange="setTemplate(' + s.id + ',this.value)" style="font-size:11px;padding:2px 4px;border:1px solid #ddd;border-radius:4px;">' + TEMPLATES.map(function(t) { return '<option value="' + t.id + '"' + (s.template === t.id ? ' selected' : '') + '>' + t.name + '</option>'; }).join('') + '</select></span>' +
      '</div>' +
      '<div class="member-actions">' +
        '<button class="' + (s.plan === "free" ? "active-plan" : "") + '" onclick="updateStore(' + s.id + ',\'free\')">Free</button>' +
        '<button class="' + (s.plan === "starter" ? "active-plan" : "") + '" onclick="showPlanModal(' + s.id + ',\'starter\')">Starter</button>' +
        '<button class="' + (s.plan === "pro" ? "active-plan" : "") + '" onclick="showPlanModal(' + s.id + ',\'pro\')">Pro</button>' +
        '<button class="' + (isTest ? "is-test" : "") + '" onclick="toggleTest(' + s.id + ')">' + (isTest ? "取消測試" : "測試") + '</button>' +
        (s.onboarding_step === "phone_pending" ? '<button style="color:#b45309;" onclick="skipPhonePending(' + s.id + ')">跳過手機驗證</button>' : '') +
        (s.is_active ? '<button style="color:#ef4444;" onclick="updateStore(' + s.id + ',\'deactivate\')">停用</button>' : '<button style="color:#16a34a;" onclick="updateStore(' + s.id + ',\'activate\')">啟用</button>') +
        '<button style="color:#991b1b;" onclick="deleteStore(' + s.id + ',\'' + s.name.replace(/'/g, "\\'") + '\')">刪除</button>' +
      '</div>' +
    '</div>';
  }).join("");
}

var PLAN_OFFERS = {
  starter: [
    { months: 1, days: 30, amount: 980, monthlyPrice: 980, bonusDays: 0 },
    { months: 6, days: 180, amount: 5280, monthlyPrice: 880, bonusDays: 0 },
    { months: 12, days: 390, amount: 8160, monthlyPrice: 680, bonusDays: 30 }
  ],
  pro: [
    { months: 1, days: 30, amount: 1580, monthlyPrice: 1580, bonusDays: 0 },
    { months: 6, days: 180, amount: 8880, monthlyPrice: 1480, bonusDays: 0 },
    { months: 12, days: 390, amount: 15360, monthlyPrice: 1280, bonusDays: 30 }
  ]
};

async function loadPlanOffers() {
  try {
    var res = await fetch("/api/plan-offers", { headers: { authorization: "Bearer " + adminToken } });
    var data = await res.json();
    if (data && data.ok && data.offers) PLAN_OFFERS = data.offers;
  } catch (e) {}
}

function showPlanModal(storeId, plan) {
  var store = allStores.find(function(s) { return s.id === storeId; });
  var name = store ? store.name || store.owner_email : "會員";
  var label = plan === "starter" ? "Starter" : "Pro";

  var options = Array.isArray(PLAN_OFFERS[plan]) ? PLAN_OFFERS[plan] : [];
  if (options.length === 0) {
    alert("尚未設定方案優惠選項");
    return;
  }
  var optionsHtml = options.map(function(opt, i) {
    var sub = opt.days + " 天" + (opt.bonusDays > 0 ? "（含贈 " + opt.bonusDays + " 天）" : "");
    return '<div class="plan-option' + (i === 0 ? " selected" : "") + '" data-months="' + opt.months + '" data-days="' + opt.days + '" data-amount="' + opt.amount + '" onclick="selectPlanOption(this)">' +
      '<div class="po-radio"></div>' +
      '<div class="po-info"><div class="po-title">' + opt.months + ' 個月</div><div class="po-sub">' + sub + '</div></div>' +
      '<div class="po-price">NT$' + Number(opt.monthlyPrice).toLocaleString() + '/月</div>' +
    '</div>';
  }).join("");

  var backdrop = document.createElement("div");
  backdrop.className = "plan-modal-backdrop";
  backdrop.innerHTML =
    '<div class="plan-modal">' +
      '<h3>設定 ' + label + ' 方案</h3>' +
      '<p class="meta">會員：' + name + '</p>' +
      optionsHtml +
      '<div class="modal-actions">' +
        '<button class="btn-cancel" onclick="closePlanModal()">取消</button>' +
        '<button class="btn-confirm" onclick="confirmPlanModal()">確認</button>' +
      '</div>' +
    '</div>';

  backdrop.dataset.storeId = storeId;
  backdrop.dataset.plan = plan;
  backdrop.addEventListener("click", function(e) {
    if (e.target === backdrop) closePlanModal();
  });
  document.body.appendChild(backdrop);
}

function selectPlanOption(el) {
  var modal = el.closest(".plan-modal");
  modal.querySelectorAll(".plan-option").forEach(function(o) { o.classList.remove("selected"); });
  el.classList.add("selected");
}

function closePlanModal() {
  var modal = document.querySelector(".plan-modal-backdrop");
  if (modal) modal.remove();
}

async function confirmPlanModal() {
  var modal = document.querySelector(".plan-modal-backdrop");
  if (!modal) return;
  var storeId = Number(modal.dataset.storeId);
  var plan = modal.dataset.plan;
  var selected = modal.querySelector(".plan-option.selected");
  var months = selected ? Number(selected.dataset.months) : 1;
  var days = selected ? Number(selected.dataset.days) : 30;
  var amount = selected ? Number(selected.dataset.amount) : 0;

  var expiresAt = new Date(Date.now() + days * 86400000).toISOString();
  closePlanModal();
  await updateStore(storeId, plan, expiresAt, amount, days, months);
}

async function updateStore(storeId, action, planExpiresAt, amount, days, months) {
  var body = { action: action };
  if (planExpiresAt) body.plan_expires_at = planExpiresAt;
  if (typeof amount === "number") body.amount = amount;
  if (typeof days === "number") body.days = days;
  if (typeof months === "number") body.months = months;
  var res = await fetch("/api/platform-admin/stores/" + storeId, {
    method: "PATCH",
    headers: { "content-type": "application/json", authorization: "Bearer " + adminToken },
    body: JSON.stringify(body),
  });
  var data = await res.json();
  if (data.ok) {
    await loadStores();
    await loadRevenueLogs();
  }
  else alert(data.error || "操作失敗");
}

async function loadApiKeys() {
  const res = await fetch("/api/platform-admin/api-keys?email=" + encodeURIComponent(adminEmail), { headers: { authorization: "Bearer " + adminToken } });
  const data = await res.json();
  if (data.ok) {
    document.getElementById("api-key-starter").value = data.starterKey || "";
    document.getElementById("api-key-pro").value = data.proKey || "";
    document.getElementById("api-key-openrouter-pro").value = data.openrouterProKey || "";
    if (data.openrouterModel) {
      selectedOpenRouterModel = data.openrouterModel;
      document.getElementById("openrouter-selected-model").textContent = data.openrouterModel;
    }
    if (data.geminiModel) {
      selectedGeminiModel = data.geminiModel;
      document.getElementById("gemini-selected-model").textContent = data.geminiModel;
    }
  }
}

async function saveApiKeys() {
  const res = await fetch("/api/platform-admin/api-keys", {
    method: "POST",
    headers: { "content-type": "application/json", authorization: "Bearer " + adminToken },
    body: JSON.stringify({
      email: adminEmail,
      starterKey: document.getElementById("api-key-starter").value.trim(),
      proKey: document.getElementById("api-key-pro").value.trim(),
      openrouterProKey: document.getElementById("api-key-openrouter-pro").value.trim(),
      openrouterModel: selectedOpenRouterModel || undefined,
      geminiModel: selectedGeminiModel || undefined,
    }),
  });
  if ((await res.json()).ok) {
    var t = document.getElementById("api-key-toast");
    t.style.display = "inline";
    setTimeout(function(){ t.style.display = "none"; }, 2000);
  }
}

let allGeminiModels = [];
let selectedGeminiModel = "";

async function fetchGeminiModels(plan) {
  var key = document.getElementById(plan === "starter" ? "api-key-starter" : "api-key-pro").value.trim();
  if (!key) { alert("請先輸入 Gemini API Key"); return; }

  var section = document.getElementById("gemini-models-section");
  var listEl = document.getElementById("gemini-model-list");
  var countEl = document.getElementById("gemini-model-count");
  listEl.innerHTML = '<p style="padding:12px;color:#999;">載入中...</p>';
  section.style.display = "block";

  try {
    var res = await fetch("https://generativelanguage.googleapis.com/v1beta/models?key=" + key);
    if (!res.ok) { listEl.innerHTML = '<p style="padding:12px;color:red;">載入失敗 (' + res.status + ')</p>'; return; }
    var data = await res.json();
    allGeminiModels = (data.models || [])
      .filter(function(m) { return m.supportedGenerationMethods && m.supportedGenerationMethods.indexOf("generateContent") !== -1; })
      .sort(function(a, b) { return a.name.localeCompare(b.name); });
    renderGeminiModels("");
    countEl.textContent = "共 " + allGeminiModels.length + " 個模型";

    var searchEl = document.getElementById("gemini-model-search");
    searchEl.oninput = function() { renderGeminiModels(this.value.toLowerCase()); };
  } catch (err) {
    listEl.innerHTML = '<p style="padding:12px;color:red;">載入失敗：' + err + '</p>';
  }
}

function selectGeminiModel(modelName) {
  selectedGeminiModel = modelName;
  document.getElementById("gemini-selected-model").textContent = modelName;
  var searchVal = (document.getElementById("gemini-model-search") || {}).value || "";
  renderGeminiModels(searchVal.toLowerCase());
}

function renderGeminiModels(query) {
  var listEl = document.getElementById("gemini-model-list");
  var filtered = allGeminiModels.filter(function(m) {
    if (!query) return true;
    return m.name.toLowerCase().indexOf(query) !== -1 || (m.displayName || "").toLowerCase().indexOf(query) !== -1;
  });

  var countEl = document.getElementById("gemini-model-count");
  countEl.textContent = query ? "搜尋結果：" + filtered.length + " / " + allGeminiModels.length + " 個模型" : "共 " + allGeminiModels.length + " 個模型";

  if (filtered.length === 0) {
    listEl.innerHTML = '<p style="padding:12px;color:#999;">沒有符合的模型</p>';
    return;
  }

  // Extract short name from "models/gemini-xxx"
  listEl.innerHTML = filtered.slice(0, 100).map(function(m) {
    var shortName = m.name.replace("models/", "");
    var isSel = shortName === selectedGeminiModel;
    var bg = isSel ? "background:#222;color:#fff;" : "";
    var nc = isSel ? "color:rgba(255,255,255,0.7);" : "color:#666;";
    return '<div onclick="selectGeminiModel(\'' + shortName.replace(/'/g, "\\'") + '\')" style="padding:10px 12px;border-bottom:1px solid ' + (isSel ? '#333' : '#f0f0f0') + ';font-size:13px;cursor:pointer;' + bg + '">' +
      '<div style="font-weight:600;">' + (isSel ? '● ' : '') + shortName + '</div>' +
      (m.displayName ? '<div style="' + nc + 'font-size:12px;">' + m.displayName + '</div>' : '') +
      '</div>';
  }).join("") + (filtered.length > 100 ? '<p style="padding:8px 12px;color:#999;font-size:12px;">... 顯示前 100 筆</p>' : '');
}

let allOpenRouterModels = [];
let selectedOpenRouterModel = "";

async function fetchOpenRouterModels() {
  var key = document.getElementById("api-key-openrouter-pro").value.trim();
  if (!key) { alert("請先輸入 OpenRouter API Key"); return; }

  var section = document.getElementById("openrouter-models-section");
  var listEl = document.getElementById("openrouter-model-list");
  var countEl = document.getElementById("openrouter-model-count");
  listEl.innerHTML = '<p style="padding:12px;color:#999;">載入中...</p>';
  section.style.display = "block";

  try {
    var res = await fetch("https://openrouter.ai/api/v1/models", {
      headers: { "Authorization": "Bearer " + key }
    });
    if (!res.ok) { listEl.innerHTML = '<p style="padding:12px;color:red;">載入失敗 (' + res.status + ')</p>'; return; }
    var data = await res.json();
    allOpenRouterModels = (data.data || []).sort(function(a, b) { return a.id.localeCompare(b.id); });
    renderOpenRouterModels("");
    countEl.textContent = "共 " + allOpenRouterModels.length + " 個模型";

    document.getElementById("openrouter-model-search").addEventListener("input", function() {
      renderOpenRouterModels(this.value.toLowerCase());
    });
  } catch (err) {
    listEl.innerHTML = '<p style="padding:12px;color:red;">載入失敗：' + err + '</p>';
  }
}

function selectOpenRouterModel(modelId) {
  selectedOpenRouterModel = modelId;
  document.getElementById("openrouter-selected-model").textContent = modelId;
  var searchVal = (document.getElementById("openrouter-model-search") || {}).value || "";
  renderOpenRouterModels(searchVal.toLowerCase());
}

function renderOpenRouterModels(query) {
  var listEl = document.getElementById("openrouter-model-list");
  var filtered = allOpenRouterModels.filter(function(m) {
    if (!query) return true;
    return m.id.toLowerCase().indexOf(query) !== -1 || (m.name || "").toLowerCase().indexOf(query) !== -1;
  });

  var countEl = document.getElementById("openrouter-model-count");
  countEl.textContent = query ? "搜尋結果：" + filtered.length + " / " + allOpenRouterModels.length + " 個模型" : "共 " + allOpenRouterModels.length + " 個模型";

  if (filtered.length === 0) {
    listEl.innerHTML = '<p style="padding:12px;color:#999;">沒有符合的模型</p>';
    return;
  }

  listEl.innerHTML = filtered.slice(0, 100).map(function(m) {
    var isSel = m.id === selectedOpenRouterModel;
    var bg = isSel ? "background:#222;color:#fff;" : "";
    var pricing = "";
    if (m.pricing) {
      var promptCost = m.pricing.prompt ? (parseFloat(m.pricing.prompt) * 1000000).toFixed(2) : "?";
      var completionCost = m.pricing.completion ? (parseFloat(m.pricing.completion) * 1000000).toFixed(2) : "?";
      var pc = isSel ? "color:rgba(255,255,255,0.6);" : "color:#999;";
      pricing = '<span style="' + pc + 'font-size:11px;">$' + promptCost + ' / $' + completionCost + ' per 1M tokens</span>';
    }
    var nc = isSel ? "color:rgba(255,255,255,0.7);" : "color:#666;";
    return '<div onclick="selectOpenRouterModel(\'' + m.id.replace(/'/g, "\\'") + '\')" style="padding:10px 12px;border-bottom:1px solid ' + (isSel ? '#333' : '#f0f0f0') + ';font-size:13px;cursor:pointer;' + bg + '">' +
      '<div style="font-weight:600;">' + (isSel ? '● ' : '') + m.id + '</div>' +
      (m.name && m.name !== m.id ? '<div style="' + nc + 'font-size:12px;">' + m.name + '</div>' : '') +
      (pricing ? '<div>' + pricing + '</div>' : '') +
      '</div>';
  }).join("") + (filtered.length > 100 ? '<p style="padding:8px 12px;color:#999;font-size:12px;">... 顯示前 100 筆，請使���搜尋��小範圍</p>' : '');
}

async function loadSystemPrompt() {
  var res = await fetch("/api/platform-admin/system-prompt", { headers: { authorization: "Bearer " + adminToken } });
  var data = await res.json();
  if (data.ok) document.getElementById("system-prompt").value = data.prompt || "";
}
async function saveSystemPrompt() {
  var res = await fetch("/api/platform-admin/system-prompt", {
    method: "POST",
    headers: { "content-type": "application/json", authorization: "Bearer " + adminToken },
    body: JSON.stringify({ prompt: document.getElementById("system-prompt").value }),
  });
  if ((await res.json()).ok) { var t = document.getElementById("prompt-toast"); t.style.display = "inline"; setTimeout(function(){ t.style.display = "none"; }, 2000); }
}

async function loadPlanLimits() {
  var res = await fetch("/api/platform-admin/plan-limits", { headers: { authorization: "Bearer " + adminToken } });
  var data = await res.json();
  if (data.ok && data.limits) {
    document.getElementById("limit-free").value = data.limits.free || 10;
    document.getElementById("limit-starter").value = data.limits.starter || 50;
    document.getElementById("limit-pro").value = data.limits.pro ?? -1;
  }
}
async function savePlanLimits() {
  var res = await fetch("/api/platform-admin/plan-limits", {
    method: "POST",
    headers: { "content-type": "application/json", authorization: "Bearer " + adminToken },
    body: JSON.stringify({
      free: Number(document.getElementById("limit-free").value),
      starter: Number(document.getElementById("limit-starter").value),
      pro: Number(document.getElementById("limit-pro").value),
    }),
  });
  if ((await res.json()).ok) { var t = document.getElementById("plan-limits-toast"); t.style.display = "inline"; setTimeout(function(){ t.style.display = "none"; }, 2000); }
}

// Revenue log functions
function initMonthSelector() {
  var sel = document.getElementById("log-month");
  if (!sel) return;
  var now = new Date();
  sel.innerHTML = "";
  for (var i = 0; i < 12; i++) {
    var d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    var val = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0");
    var label = d.getFullYear() + " 年 " + (d.getMonth() + 1) + " 月";
    sel.innerHTML += '<option value="' + val + '">' + label + '</option>';
  }
}

async function loadRevenueLogs() {
  var month = document.getElementById("log-month")?.value || "";
  var res = await fetch("/api/platform-admin/revenue-logs?month=" + month, { headers: { authorization: "Bearer " + adminToken } });
  var data = await res.json();
  if (data.ok) {
    allLogs = data.logs || [];
    renderLogs();
  }
}

function filterLogs(status, btn) {
  logFilter = status;
  document.querySelectorAll("#log-filters .pill-btn").forEach(function(b) { b.classList.remove("active"); });
  btn.classList.add("active");
  renderLogs();
}

var STATUS_LABELS = { normal: "正常", pending: "待處理", cancelled: "取消" };

function renderLogs() {
  var filtered = logFilter === "all" ? allLogs : allLogs.filter(function(l) { return l.status === logFilter; });

  var totalRevenue = 0;
  allLogs.forEach(function(l) { if (l.status === "normal") totalRevenue += l.amount; });
  document.getElementById("stat-revenue").textContent = "NT$" + totalRevenue.toLocaleString();

  var monthLabel = document.getElementById("log-month")?.selectedOptions?.[0]?.textContent || "本月";
  document.getElementById("stat-revenue-label").textContent = monthLabel + " 總收入";

  var list = document.getElementById("log-list");
  if (!list) return;
  if (filtered.length === 0) {
    list.innerHTML = '<p class="log-empty">此期間沒有紀錄</p>';
    return;
  }

  list.innerHTML = filtered.map(function(l) {
    var amountClass = l.status !== "normal" ? " zero" : "";
    var dateStr = new Date(l.created_at).toLocaleDateString("zh-TW");
    var planLabel = l.plan === "starter" ? "Starter" : "Pro";
    var statusOpts = ["normal", "pending", "cancelled"].map(function(s) {
      return '<option value="' + s + '"' + (l.status === s ? " selected" : "") + '>' + STATUS_LABELS[s] + '</option>';
    }).join("");

    return '<div class="log-card">' +
      '<div class="log-info">' +
        '<div class="log-name">' + (l.store_name || l.store_email) + '</div>' +
        '<div class="log-meta">' + planLabel + ' · ' + l.days + ' 天 · ' + dateStr + '</div>' +
      '</div>' +
      '<select class="log-status-' + l.status + '" onchange="updateLogStatus(' + l.id + ', this.value)">' + statusOpts + '</select>' +
      '<div class="log-amount' + amountClass + '">NT$' + l.amount.toLocaleString() + '</div>' +
    '</div>';
  }).join("");
}

async function updateLogStatus(logId, status) {
  var res = await fetch("/api/platform-admin/revenue-logs/" + logId, {
    method: "PATCH",
    headers: { "content-type": "application/json", authorization: "Bearer " + adminToken },
    body: JSON.stringify({ status: status }),
  });
  var data = await res.json();
  if (data.ok) {
    var log = allLogs.find(function(l) { return l.id === logId; });
    if (log) log.status = status;
    renderLogs();
  } else alert(data.error || "操作失敗");
}

if (adminToken) showDashboard();
</script>
