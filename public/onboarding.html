<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>vovosnap — 設定你的店面</title>
<link rel="icon" type="image/png" href="/assets/images/logo-3.png" />
<style>
:root {
  --brand: #8A9A5B;
  --brand-dark: #768a4a;
  --text: #3D3A35;
  --text-secondary: #7A756D;
  --text-muted: #A09A90;
  --bg: #F9F7F1;
  --bg-card: #FFFEFA;
  --border: #E5E0D6;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: var(--text); background: var(--bg); min-height: 100vh; }
.container { max-width: 480px; margin: 0 auto; padding: 40px 20px; }
.logo { text-align: center; margin-bottom: 32px; }
.logo img { height: 36px; }
.card { background: var(--bg-card); border-radius: 12px; padding: 32px 24px; border: 1px solid var(--border); margin-bottom: 16px; }
.card h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
.card p { font-size: 14px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 16px; }

/* Steps indicator */
.steps { display: flex; gap: 4px; margin-bottom: 32px; }
.steps .dot { flex: 1; height: 4px; border-radius: 2px; background: var(--border); }
.steps .dot.active { background: var(--brand); }
.steps .dot.done { background: #22c55e; }

/* Forms */
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
.form-group input { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; background: #fff; color: var(--text); }
.form-group input:focus { outline: none; border-color: var(--brand); }
.form-group .hint { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
.form-group .error { font-size: 12px; color: #ef4444; margin-top: 4px; display: none; }

.btn { display: inline-block; padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; width: 100%; text-align: center; }
.btn-primary { background: var(--brand); color: #fff; }
.btn-primary:hover { background: var(--brand-dark); }
.btn-primary:disabled { background: #ccc; cursor: not-allowed; }
.btn-secondary { background: var(--bg); color: var(--text); margin-top: 8px; border: 1px solid var(--border); }
.btn-secondary:hover { background: #eee; }

.status-badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
.status-pending { background: #fef3c7; color: #92400e; }
.status-done { background: #dcfce7; color: #166534; }

.hidden { display: none !important; }
.loading { text-align: center; padding: 20px; color: var(--text-muted); }

/* Phone input */
#phone-container { min-height: 50px; }
</style>
</head>
<body>

<div class="container">
  <div class="logo"><a href="/"><img src="/assets/images/logo-3.png" alt="VOVOSnap" /></a></div>

  <div class="steps">
    <div class="dot" id="dot-1"></div>
    <div class="dot" id="dot-2"></div>
    <div class="dot" id="dot-3"></div>
    <div class="dot" id="dot-4"></div>
  </div>

  <div class="loading" id="loading">載入中...</div>

  <!-- Step 1: Email Verification -->
  <div class="card hidden" id="step-email">
    <h2>📧 驗證 Email</h2>
    <!-- If email exists, show verification message -->
    <div id="email-verify-section">
      <p>我們已發送驗證信到 <strong id="user-email"></strong>。請檢查你的信箱並點擊驗證連結。</p>
      <button class="btn btn-secondary" id="resend-email-btn" onclick="resendEmail()">重新發送驗證信</button>
      <p id="resend-status" style="font-size:13px;margin-top:8px;" class="hidden"></p>
      <p id="resend-cooldown" style="font-size:12px;color:#888;margin-top:4px;" class="hidden"></p>
    </div>
    <!-- If no email (LINE Login), ask user to enter email -->
    <div id="email-input-section" class="hidden">
      <p>請輸入你的 Email 以完成帳號驗證。</p>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email-input" placeholder="you@example.com" />
      </div>
      <button class="btn btn-primary" onclick="submitEmail()">發送驗證信</button>
      <p id="email-submit-error" style="font-size:13px;color:#ef4444;margin-top:8px;" class="hidden"></p>
    </div>
  </div>

  <!-- Step 2: Phone Verification -->
  <div class="card hidden" id="step-phone">
    <h2>📱 驗證手機號碼</h2>
    <p>輸入你的手機號碼，我們會發送簡訊驗證碼。</p>
    <div class="form-group">
      <label>手機號碼</label>
      <div style="display:flex;gap:6px;align-items:center;">
        <span style="padding:10px 12px;background:#f5f5f5;border:1.5px solid #ddd;border-radius:8px;font-size:14px;color:#555;white-space:nowrap;">+886</span>
        <input type="tel" id="phone-input" placeholder="912345678" style="flex:1;" />
      </div>
      <div class="hint">首位 0 會自動移除</div>
    </div>
    <button class="btn btn-primary" id="send-code-btn" onclick="sendPhoneCode()">發送驗證碼</button>

    <div class="hidden" id="verify-code-section" style="margin-top:16px;">
      <div class="form-group">
        <label>驗證碼</label>
        <input type="text" id="code-input" placeholder="123456" maxlength="6" />
      </div>
      <button class="btn btn-primary" onclick="verifyPhoneCode()">驗證</button>
    </div>
    <p id="phone-error" class="error"></p>
  </div>

  <!-- Step 3: Store Setup -->
  <div class="card hidden" id="step-store">
    <h2>🏪 設定你的店面</h2>
    <p>最後一步! 設定你的店面名稱和網址。預設代購國家/幣值為台灣，可在後台設定內再調整代購國家。</p>
    <div class="form-group">
      <label>店面名稱</label>
      <input type="text" id="store-name" placeholder="小美日本代購" maxlength="100" />
    </div>
    <div class="form-group">
      <label>店面網址 (slug)</label>
      <input type="text" id="store-slug" placeholder="xiaomei" maxlength="30" pattern="[a-z0-9-]+" oninput="this.value=this.value.toLowerCase().replace(/[^a-z0-9-]/g,'')" />
      <div class="hint" id="slug-preview">你的店面網址：vovosnap.com/s/<span id="slug-display">...</span></div>
      <div class="error" id="slug-error"></div>
    </div>
    <div class="form-group">
      <label>網站說明（選填）</label>
      <input type="text" id="store-description" placeholder="日韓代購，品質保證" maxlength="200" />
      <div class="hint">顯示在商店名稱下方，讓客人一眼了解你的服務（最多 200 字）</div>
    </div>
    <div class="form-group">
      <label>LINE ID（選填）</label>
      <input type="text" id="store-line" placeholder="@xiaomei_buy" />
    </div>
    <button class="btn btn-primary" onclick="completeSetup()">完成開店!</button>
    <p id="setup-error" style="font-size:13px;color:#ef4444;margin-top:8px;" class="hidden"></p>
  </div>

  <!-- Complete -->
  <div class="card hidden" id="step-complete">
    <h2 style="text-align:center;">🎉 恭喜開店成功!</h2>
    <p style="text-align:center;">你的 vovosnap 店面已經準備好了。</p>
    <a id="go-to-store" href="#" class="btn btn-primary" style="display:block;text-decoration:none;margin-top:16px;">進入我的店面</a>
  </div>
</div>

<script type="module">
let currentStore = null;

// Initialize and check auth state
async function initApp() {
  const configResp = await fetch("/auth/me", { credentials: "same-origin" });
  const configData = await configResp.json();
  if (!configData.ok) {
    // Not logged in — show login prompt instead of redirect loop
    document.getElementById("loading").innerHTML =
      '<p style="margin-bottom:16px;">請先登入</p>' +
      '<div style="display:flex;flex-direction:column;gap:10px;max-width:260px;margin:0 auto;">' +
      '<a href="/auth/google" style="display:flex;align-items:center;justify-content:center;gap:8px;padding:12px 20px;background:#1a1a1a;color:#fff;border-radius:8px;text-decoration:none;font-weight:600;font-size:14px;">Google 登入</a>' +
      '<a href="/auth/line" style="display:flex;align-items:center;justify-content:center;gap:8px;padding:12px 20px;background:#06C755;color:#fff;border-radius:8px;text-decoration:none;font-weight:600;font-size:14px;">LINE 登入</a>' +
      '</div>';
    return;
  }
  currentStore = configData.store;
  return configData;
}

async function init() {
  const data = await initApp();
  if (!data) return;

  document.getElementById("loading").classList.add("hidden");

  const step = currentStore.onboarding_step;
  updateDots(step);

  if (step === "email_pending") {
    if (currentStore.owner_email) {
      document.getElementById("user-email").textContent = currentStore.owner_email;
      document.getElementById("email-verify-section").classList.remove("hidden");
      document.getElementById("email-input-section").classList.add("hidden");
      pollEmailVerification();
    } else {
      document.getElementById("email-verify-section").classList.add("hidden");
      document.getElementById("email-input-section").classList.remove("hidden");
    }
    document.getElementById("step-email").classList.remove("hidden");
  } else if (step === "phone_pending") {
    document.getElementById("step-phone").classList.remove("hidden");
  } else if (step === "store_setup") {
    document.getElementById("step-store").classList.remove("hidden");
  } else if (step === "complete") {
    document.getElementById("step-complete").classList.remove("hidden");
    document.getElementById("go-to-store").href = "/s/" + currentStore.slug + "/admin";
  }
}

function updateDots(step) {
  const steps = ["email_pending", "phone_pending", "store_setup", "complete"];
  const idx = steps.indexOf(step);
  for (let i = 0; i < 4; i++) {
    const dot = document.getElementById("dot-" + (i + 1));
    dot.className = "dot";
    if (i < idx) dot.classList.add("done");
    else if (i === idx) dot.classList.add("active");
  }
}

// Email verification polling
async function pollEmailVerification() {
  const check = async () => {
    const resp = await fetch("/auth/me", { credentials: "same-origin" });
    const data = await resp.json();
    if (data.ok && data.store.onboarding_step !== "email_pending") {
      window.location.reload();
    }
  };
  setInterval(check, 5000);
}

// Email resend rate limiting
let resendCount = parseInt(localStorage.getItem("resend_count") || "0", 10);
let resendDate = localStorage.getItem("resend_date") || "";
const today = new Date().toISOString().slice(0, 10);
if (resendDate !== today) { resendCount = 0; localStorage.setItem("resend_date", today); }

async function resendEmail() {
  if (resendCount >= 5) {
    const st = document.getElementById("resend-status");
    st.textContent = "今日重發次數已達上限（5 次），請明日再試";
    st.style.color = "#ef4444";
    st.classList.remove("hidden");
    return;
  }

  const btn = document.getElementById("resend-email-btn");
  btn.disabled = true;
  btn.textContent = "發送中...";

  const resp = await fetch("/auth/resend-verification", { method: "POST", credentials: "same-origin" });
  const data = await resp.json();

  resendCount++;
  localStorage.setItem("resend_count", String(resendCount));
  localStorage.setItem("resend_date", today);

  const st = document.getElementById("resend-status");
  if (data.ok) {
    st.textContent = "已重新發送!";
    st.style.color = "#22c55e";
  } else {
    st.textContent = data.error || "發送失敗";
    st.style.color = "#ef4444";
  }
  st.classList.remove("hidden");

  // Cooldown: 2nd=120s, 3rd-5th=180s
  const cooldown = resendCount <= 1 ? 0 : resendCount === 2 ? 120 : 180;
  if (cooldown > 0) {
    startCooldown(cooldown);
  } else {
    btn.textContent = "重新發送驗證信";
    btn.disabled = false;
  }
}

function startCooldown(seconds) {
  const btn = document.getElementById("resend-email-btn");
  const cdEl = document.getElementById("resend-cooldown");
  let remaining = seconds;
  btn.disabled = true;
  cdEl.classList.remove("hidden");

  function tick() {
    if (remaining <= 0) {
      btn.textContent = "重新發送驗證信";
      btn.disabled = resendCount >= 5;
      cdEl.classList.add("hidden");
      return;
    }
    btn.textContent = "請等待 " + remaining + " 秒";
    cdEl.textContent = "下次可重發：" + remaining + " 秒後";
    remaining--;
    setTimeout(tick, 1000);
  }
  tick();
}

// Phone verification via Every8D SMS
function formatPhoneNumber(raw) {
  let num = raw.replace(/[\s\-()]/g, "");
  if (num.startsWith("0")) num = num.substring(1);
  if (!num.startsWith("+")) num = "+886" + num;
  return num;
}

async function sendPhoneCode() {
  const rawPhone = document.getElementById("phone-input").value.trim();
  if (!rawPhone) return;
  const phone = formatPhoneNumber(rawPhone);

  const btn = document.getElementById("send-code-btn");
  btn.disabled = true;
  btn.textContent = "發送中...";
  const errEl = document.getElementById("phone-error");
  errEl.style.display = "none";

  try {
    const resp = await fetch("/auth/send-phone-code", {
      method: "POST",
      headers: { "content-type": "application/json" },
      credentials: "same-origin",
      body: JSON.stringify({ phoneNumber: phone }),
    });
    const data = await resp.json();
    if (data.ok) {
      document.getElementById("verify-code-section").classList.remove("hidden");
      startPhoneCooldown(btn);
    } else {
      errEl.textContent = data.error || "發送失敗";
      errEl.style.display = "block";
      btn.textContent = "發送驗證碼";
      btn.disabled = false;
    }
  } catch (e) {
    errEl.textContent = "發送失敗: " + (e.message || e);
    errEl.style.display = "block";
    btn.textContent = "發送驗證碼";
    btn.disabled = false;
  }
}

function startPhoneCooldown(btn) {
  let remaining = 60;
  btn.disabled = true;
  btn.textContent = "重新發送（" + remaining + "s）";
  const timer = setInterval(function() {
    remaining--;
    if (remaining <= 0) {
      clearInterval(timer);
      btn.disabled = false;
      btn.textContent = "重新發送驗證碼";
    } else {
      btn.textContent = "重新發送（" + remaining + "s）";
    }
  }, 1000);
}

async function verifyPhoneCode() {
  const code = document.getElementById("code-input").value.trim();
  if (!code) return;

  const errEl = document.getElementById("phone-error");
  errEl.style.display = "none";

  try {
    const resp = await fetch("/auth/verify-phone", {
      method: "POST",
      headers: { "content-type": "application/json" },
      credentials: "same-origin",
      body: JSON.stringify({ code }),
    });
    const data = await resp.json();
    if (data.ok) {
      window.location.reload();
    } else {
      errEl.textContent = data.error || "驗證失敗";
      errEl.style.display = "block";
    }
  } catch (e) {
    errEl.textContent = "驗證碼錯誤";
    errEl.style.display = "block";
  }
}

// Store setup
document.getElementById("store-slug")?.addEventListener("input", function() {
  document.getElementById("slug-display").textContent = this.value || "...";
});

async function completeSetup() {
  const name = document.getElementById("store-name").value.trim();
  const slug = document.getElementById("store-slug").value.trim();
  const lineId = document.getElementById("store-line").value.trim();
  const errEl = document.getElementById("setup-error");
  errEl.classList.add("hidden");

  if (!name) { errEl.textContent = "請輸入店面名稱"; errEl.classList.remove("hidden"); return; }
  if (!slug || slug.length < 3) { errEl.textContent = "網址至少 3 個字元"; errEl.classList.remove("hidden"); return; }

  const resp = await fetch("/auth/complete-onboarding", {
    method: "POST",
    headers: { "content-type": "application/json" },
    body: JSON.stringify({ slug, name, lineId: lineId || undefined, description: document.getElementById("store-description").value.trim() || undefined }),
  });
  const data = await resp.json();
  if (data.ok) {
    document.getElementById("step-store").classList.add("hidden");
    document.getElementById("step-complete").classList.remove("hidden");
    document.getElementById("go-to-store").href = data.redirectUrl || "/s/" + slug + "/admin";
    updateDots("complete");
  } else {
    errEl.textContent = data.error || "設定失敗";
    errEl.classList.remove("hidden");
  }
}

// Submit email for LINE Login users without email
async function submitEmail() {
  const email = document.getElementById("email-input").value.trim();
  const errEl = document.getElementById("email-submit-error");
  errEl.classList.add("hidden");

  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    errEl.textContent = "請輸入有效的 Email";
    errEl.classList.remove("hidden");
    return;
  }

  const resp = await fetch("/auth/set-email", {
    method: "POST",
    headers: { "content-type": "application/json" },
    credentials: "same-origin",
    body: JSON.stringify({ email }),
  });
  const data = await resp.json();
  if (data.ok) {
    if (data.merged) {
      // Account merged with existing store — reload to pick up merged store state
      window.location.reload();
      return;
    }
    // Switch to verification UI
    document.getElementById("user-email").textContent = email;
    document.getElementById("email-input-section").classList.add("hidden");
    document.getElementById("email-verify-section").classList.remove("hidden");
    pollEmailVerification();
  } else {
    errEl.textContent = data.error || "設定失敗";
    errEl.classList.remove("hidden");
  }
}

// Expose functions to HTML onclick handlers (module scope is not global)
window.resendEmail = resendEmail;
window.submitEmail = submitEmail;
window.sendPhoneCode = sendPhoneCode;
window.verifyPhoneCode = verifyPhoneCode;
window.completeSetup = completeSetup;

init();
</script>
</body>
</html>
