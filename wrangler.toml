name = "japan-buy-workers"  # TODO: rename to "vovosnap-workers" when ready to deploy
main = "src/index.ts"
compatibility_date = "2026-03-13"
assets = { directory = "./public", binding = "ASSETS", run_worker_first = true }

routes = [
  { pattern = "vovosnap.com/*", zone_name = "vovosnap.com" },
  { pattern = "*.vovosnap.com/*", zone_name = "vovosnap.com" },
]

[vars]
CRAWL_LIST_PAGES = "100"
CRAWL_MAX_PAGES = "100"
CRAWL_TIMEOUT_MS = "120000"
APP_URL = "https://vovosnap.com"
MAIN_DOMAIN = "vovosnap.com"
EVERY8D_SITE_URL = "new.e8d.tw"
SMS_RELAY_URL = "https://relay-sms-production.up.railway.app/send"

# Secrets (set via: wrangler secret put <KEY>):
# GOOGLE_CLIENT_ID
# GOOGLE_CLIENT_SECRET
# LINE_CHANNEL_ID
# LINE_CHANNEL_SECRET
# RESEND_API_KEY
# PLATFORM_ADMIN_PASSWORD
# EVERY8D_UID
# EVERY8D_PWD

[[d1_databases]]
binding = "DB"
database_name = "japan_buy"
database_id = "35f83000-fddb-477c-9714-67aa1ba50864"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "japan-buy-images"
